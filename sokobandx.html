<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sokoban</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%2250%22 y=%2275%22 font-size=%2280%22 text-anchor=%22middle%22>%F0%9F%93%A6</text></svg>">
<style>
:root {
--bg-color: #121212;
--board-bg-color: #1e1e1e;
--border-color: #444444;
--text-color: #e0e0e0;
--font-family: Arial, sans-serif;
--wall-color: #333333;
--player-color: #4fc3f7;
--box-color: #ffb74d;
--goal-color: #7cb342;
--box-on-goal-color: #388e3c;
--tile-size: 30px;
}
body {
background-color: var(--bg-color);
color: var(--text-color);
font-family: var(--font-family);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
min-height: 100vh;
margin: 0;
font-size: 14px;
}
#game-container {
display: flex;
flex-direction: column;
align-items: center;
padding: 10px;
border: 2px solid var(--border-color);
background-color: var(--board-bg-color);
box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
border-radius: 8px;
}
#game-board {
display: grid;
line-height: 1;
margin-bottom: 15px;
border-spacing: 0;
background-color: var(--board-bg-color);
}
.tile {
width: var(--tile-size);
height: var(--tile-size);
display: flex;
align-items: center;
justify-content: center;
font-size: calc(var(--tile-size) * 0.6);
font-weight: bold;
box-sizing: border-box;
transition: all 0.1s ease-out;
position: relative;
}
.wall {
background-color: var(--wall-color);
border-radius: 4px;
border: 1px solid rgba(0, 0, 0, 0.2);
}
.goal::before {
content: '';
position: absolute;
width: calc(var(--tile-size) * 0.7);
height: calc(var(--tile-size) * 0.7);
border: 2px dashed var(--goal-color);
border-radius: 4px;
box-sizing: border-box;
opacity: 0.6;
}
.player, .player-on-goal {
color: var(--player-color);
z-index: 3;
}
.player::after, .player-on-goal::after {
content: '🧍';
font-size: calc(var(--tile-size) * 0.8);
position: absolute;
}
.box {
color: var(--box-color);
z-index: 2;
}
.box::after {
content: '📦';
font-size: calc(var(--tile-size) * 0.7);
position: absolute;
}
.box-on-goal {
color: var(--box-on-goal-color);
}
.box-on-goal::after {
content: '✅';
font-size: calc(var(--tile-size) * 0.7);
position: absolute;
}
.tile span {
display: none;
}
#status-bar {
width: 100%;
display: flex;
justify-content: space-between;
margin-bottom: 15px;
font-size: 1em;
padding: 5px 0;
}
#instructions {
border-top: 2px solid var(--border-color);
padding-top: 10px;
text-align: center;
color: #888;
font-size: 0.9em;
}
#win-message {
display: none;
font-size: 2em;
text-align: center;
color: var(--goal-color);
}
#level-chooser-overlay {
display: none;
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background-color: rgba(0, 0, 0, 0.9);
justify-content: center;
align-items: center;
z-index: 100;
}
#level-chooser-modal {
background-color: var(--board-bg-color);
border: 2px solid var(--border-color);
padding: 25px;
max-height: 80vh;
display: flex;
flex-direction: column;
border-radius: 8px;
}
#chooser-title {
text-align: center;
font-size: 1.5em;
margin-bottom: 15px;
}
#level-list {
list-style: none;
padding: 0;
margin: 0;
overflow-y: auto;
flex-grow: 1;
min-width: 200px;
}
#level-list li {
padding: 8px 15px;
cursor: pointer;
border: 1px solid transparent;
margin-bottom: 4px;
border-radius: 4px;
}
#level-list li:hover {
background-color: #333;
}
#level-list li.selected {
background-color: var(--player-color);
color: var(--bg-color);
font-weight: bold;
}
#chooser-instructions {
border-top: 2px solid var(--border-color);
padding-top: 10px;
margin-top: 15px;
text-align: center;
color: #888;
}
</style>
</head>
<body>
<div id="game-container">
<div id="status-bar">
<span id="level-display">&nbsp;</span>
<span id="moves-display">&nbsp;</span>
<span id="pushes-display">&nbsp;</span>
</div>
<div id="game-board"></div>
<div id="instructions">Use Arrow Keys | [R] Reset | [U] Undo | [L] Level Select</div>
</div>
<div id="win-message">-- ALL LEVELS COMPLETE --</div>
<div id="level-chooser-overlay">
<div id="level-chooser-modal">
<div id="chooser-title">-- SELECT LEVEL --</div>
<ul id="level-list"></ul>
<div id="chooser-instructions">[↑/↓] Navigate | [Enter] Select | [Esc] or [L] to Close</div>
</div>
</div>

this.playerPos = { x, y };
}
if ([Tiles.Goal, Tiles.PlayerOnGoal, Tiles.BoxOnGoal].includes(char)) {
this.goals.push({ x, y });
}
if ([Tiles.PlayerOnGoal, Tiles.BoxOnGoal, Tiles.Goal].includes(char)) {
boardRow.push(char === Tiles.BoxOnGoal ? Tiles.Box : Tiles.Floor);
} else {
boardRow.push(char);
}
}
this.board.push(boardRow);
this.maxCols = Math.max(this.maxCols, row.length);
});
this.setTileAt(this.playerPos.x, this.playerPos.y, Tiles.Player);
return true;
}
getTileAt(x, y) {
return this.board[y]?.[x] || null;
}
setTileAt(x, y, tile) {
if (this.board[y]?.[x] !== undefined) {
this.board[y][x] = tile;
}
}
isGoalAt(x, y) {
return this.goals.some(g => g.x === x && g.y === y);
}
movePlayer(dx, dy) {
const { x, y } = this.playerPos;
const newPos = { x: x + dx, y: y + dy };
const tileAtNewPos = this.getTileAt(newPos.x, newPos.y);
if (tileAtNewPos === Tiles.Wall) return null;
let pushedBox = false;
const changes = [];
const playerTileBeforeMove = this.getTileAt(x, y);
if (tileAtNewPos === Tiles.Box) {
const afterBoxPos = { x: newPos.x + dx, y: newPos.y + dy };
const tileAfterBox = this.getTileAt(afterBoxPos.x, afterBoxPos.y);
if ([Tiles.Wall, Tiles.Box].includes(tileAfterBox)) return null;
this.setTileAt(afterBoxPos.x, afterBoxPos.y, Tiles.Box);
changes.push({ ...afterBoxPos, oldTile: tileAfterBox, newTile: Tiles.Box });
pushedBox = true;
}
this.setTileAt(x, y, Tiles.Floor);
changes.push({ x, y, oldTile: playerTileBeforeMove, newTile: Tiles.Floor });
this.setTileAt(newPos.x, newPos.y, Tiles.Player);
changes.push({ ...newPos, oldTile: tileAtNewPos, newTile: Tiles.Player });
this.playerPos = newPos;
this.moves++;
if (pushedBox) this.pushes++;
this.history.push({ changes, pushed: pushedBox });
return changes;
}
undo() {
if (this.history.length === 0) return null;
const lastMove = this.history.pop();
const reversedChanges = [];
for (let i = lastMove.changes.length - 1; i >= 0; i--) {
const change = lastMove.changes[i];
this.setTileAt(change.x, change.y, change.oldTile);
if ([Tiles.Player, Tiles.PlayerOnGoal].includes(change.oldTile)) {
this.playerPos = { x: change.x, y: change.y };
}
reversedChanges.push({ x: change.x, y: change.y });
}
this.moves--;
if (lastMove.pushed) this.pushes--;
return reversedChanges;
}
checkWin() {
return this.goals.every(g => this.getTileAt(g.x, g.y) === Tiles.Box);
}
}
class UIManager {
constructor(game) {
this.game = game;
this.elements = {
board: document.getElementById('game-board'),
level: document.getElementById('level-display'),
moves: document.getElementById('moves-display'),
pushes: document.getElementById('pushes-display'),
gameContainer: document.getElementById('game-container'),
winMessage: document.getElementById('win-message'),
chooserOverlay: document.getElementById('level-chooser-overlay'),
levelList: document.getElementById('level-list')
};
this.tileElements = [];
this.isChooserOpen = false;
this.selectedInChooser = 0;
this.VIEWPORT_SCALE = 0.8;
this.MIN_TILE_SIZE = 30;
this.MAX_TILE_SIZE = 60;
}
getTileClassName(char, x, y) {
const isGoal = this.game.isGoalAt(x, y);
if (char === Tiles.Player) return isGoal ? 'player-on-goal' : 'player';
if (char === Tiles.Box) return isGoal ? 'box-on-goal' : 'box';
if (char === Tiles.Wall) return 'wall';
if (isGoal) return 'goal';
return 'floor';
}
getDisplayCharacter(char, x, y) {
return ' ';
}
renderFullBoard() {
this.elements.board.innerHTML = '';
this.tileElements = [];
const numCols = this.game.maxCols;
this.elements.board.style.gridTemplateColumns = `repeat(${numCols}, var(--tile-size))`;
this.game.board.forEach((row, y) => {
const tileRow = [];
row.forEach((char, x) => {
const tileEl = document.createElement('span');
tileEl.className = 'tile';
const charSpan = document.createElement('span');
charSpan.textContent = char;
tileEl.appendChild(charSpan);
const className = this.getTileClassName(char, x, y);
if (className) tileEl.classList.add(className);
tileEl.style.gridColumn = `${x + 1}`;
tileEl.style.gridRow = `${y + 1}`;
this.elements.board.appendChild(tileEl);
tileRow.push(tileEl);
});
this.tileElements.push(tileRow);
});
this.adjustFontSize();
this.updateStatus();
}
updateTiles(changedTiles) {
if (!changedTiles) return;
changedTiles.forEach(change => {
const char = this.game.getTileAt(change.x, change.y);
const tileEl = this.tileElements[change.y]?.[change.x];
if (tileEl) {
const oldClasses = Array.from(tileEl.classList).filter(c => !['tile'].includes(c));
tileEl.classList.remove(...oldClasses);
const className = this.getTileClassName(char, change.x, change.y);
if (className) tileEl.classList.add(className);
tileEl.querySelector('span').textContent = char;
}
});
this.updateStatus();
}
updateStatus() {
this.elements.level.textContent = `LEVEL: ${this.game.currentLevelIndex + 1}/${LEVELS.length}`;
this.elements.moves.textContent = `MOVES: ${this.game.moves}`;
this.elements.pushes.textContent = `PUSHES: ${this.game.pushes}`;
}
showWinMessage() {
this.elements.gameContainer.style.display = 'none';
this.elements.winMessage.style.display = 'block';
}
toggleLevelChooser() {
this.isChooserOpen = !this.isChooserOpen;
this.elements.chooserOverlay.style.display = this.isChooserOpen ? 'flex' : 'none';
if (this.isChooserOpen) {
this.selectedInChooser = this.game.currentLevelIndex;
this.populateChooser();
}
}
populateChooser() {
this.elements.levelList.innerHTML = '';
LEVELS.forEach((_, index) => {
const li = document.createElement('li');
li.textContent = `Level ${index + 1}`;
li.dataset.index = index;
if (index === this.selectedInChooser) li.classList.add('selected');
li.addEventListener('click', () => {
this.selectedInChooser = index;
app.selectLevel();
});
this.elements.levelList.appendChild(li);
});
this.elements.levelList.querySelector('.selected')?.scrollIntoView({ block: 'center' });
}
navigateChooser(direction) {
const current = this.elements.levelList.querySelector(`[data-index='${this.selectedInChooser}']`);
if (current) current.classList.remove('selected');
this.selectedInChooser = (this.selectedInChooser + direction + LEVELS.length) % LEVELS.length;
const newSelected = this.elements.levelList.querySelector(`[data-index='${this.selectedInChooser}']`);
if (newSelected) {
newSelected.classList.add('selected');
newSelected.scrollIntoView({ block: 'center', behavior: 'smooth' });
}
}
adjustFontSize() {
if (this.game.board.length === 0 || this.game.maxCols === 0) return;
const numRows = this.game.board.length;
const numCols = this.game.maxCols;
const targetHeight = document.documentElement.clientHeight * this.VIEWPORT_SCALE;
const targetWidth = document.documentElement.clientWidth * this.VIEWPORT_SCALE;
const sizeFromH = targetHeight / numRows;
const sizeFromW = targetWidth / numCols;
let newTileSize = Math.max(this.MIN_TILE_SIZE, Math.floor(Math.min(sizeFromH, sizeFromW)));
newTileSize = Math.min(newTileSize, this.MAX_TILE_SIZE);
document.documentElement.style.setProperty('--tile-size', `${newTileSize}px`);
}
}
class App {
constructor() {
this.game = new SokobanGame();
this.ui = new UIManager(this.game);
this.init();
}
init() {
document.addEventListener('keydown', this.handleKeyDown.bind(this));
window.addEventListener('resize', this.handleResize.bind(this));
const savedLevel = parseInt(localStorage.getItem(STORAGE_KEY) || '0', 10);
this.startLevel(savedLevel);
}
handleResize() {
this.ui.adjustFontSize();
}
startLevel(levelIndex) {
const levelLoaded = this.game.loadLevel(levelIndex);
if (levelLoaded) {
this.ui.renderFullBoard();
} else {
this.ui.showWinMessage();
}
}
selectLevel() {
this.startLevel(this.ui.selectedInChooser);
localStorage.setItem(STORAGE_KEY, this.ui.selectedInChooser);
this.ui.toggleLevelChooser();
}
handleKeyDown(e) {
if (this.ui.isChooserOpen) {
e.preventDefault();
switch (e.key.toLowerCase()) {
case 'arrowup': this.ui.navigateChooser(-1); break;
case 'arrowdown': this.ui.navigateChooser(1); break;
case 'enter': this.selectLevel(); break;
case 'l': case 'escape': this.ui.toggleLevelChooser(); break;
}
return;
}
let dx = 0, dy = 0;
switch (e.key.toLowerCase()) {
case 'arrowup': dy = -1; break;
case 'arrowdown': dy = 1; break;
case 'arrowleft': dx = -1; break;
case 'arrowright': dx = 1; break;
case 'r': this.startLevel(this.game.currentLevelIndex); return;
case 'u':
const undoneChanges = this.game.undo();
this.ui.updateTiles(undoneChanges);
return;
case 'l': this.ui.toggleLevelChooser(); return;
default: return;
}
if (dx !== 0 || dy !== 0) {
e.preventDefault();
const changes = this.game.movePlayer(dx, dy);
this.ui.updateTiles(changes);
if (this.game.checkWin()) {
const nextLevel = this.game.currentLevelIndex + 1;
localStorage.setItem(STORAGE_KEY, nextLevel);
setTimeout(() => this.startLevel(nextLevel), 500);
}
}
}
}
const app = new App();
</script>
<script>
window.addEventListener('keydown', (e) => {
if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
e.preventDefault();
}
}, false);
</script>
