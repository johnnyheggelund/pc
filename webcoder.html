<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1e1e1e">
<title>Web Code Editor (HTML, CSS & JS)</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%2250%22 y=%2275%22 font-size=%2280%22 text-anchor=%22middle%22>%F0%9F%92%BB</text></svg>">
<style>
:root {
--bg-color: #1e1e1e;
--text-color: #d4d4d4;
--line-height: 24px;
--font-size: 15px;
--font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
--selection-bg: #264f78;
--cursor-color: #aeafad;
--line-num-bg: #1e1e1e;
--line-num-text: #858585;
--border-color: #333;
--c-comment: #6a9955;
--c-string: #ce9178;
--c-number: #b5cea8;
--c-keyword: #c586c0;
--c-function: #dcdcaa;
--c-tag: #569cd6;
--c-attr: #9cdcfe;
--c-selector: #d7ba7d;
--c-property: #9cdcfe;
--char-width: 9.6px;
}
body {
margin: 0;
padding: 0;
overflow: hidden;
background: var(--bg-color);
color: var(--text-color);
font-family: var(--font-family);
}
#editor {
position: relative;
top: 70px;
width: 100vw;
height: calc(100vh - 100px);
overflow: auto;
outline: none;
cursor: text;
}
#scroll-phantom {
position: absolute;
top: 0;
left: 0;
z-index: -1;
width: 1px;
height: 1px;
}
#view-port {
position: absolute;
top: 0;
left: 0;
min-width: 100%;
pointer-events: none;
will-change: transform;
z-index: 5;
}
.line {
height: var(--line-height);
line-height: var(--line-height);
font-size: var(--font-size);
font-family: var(--font-family) !important;
white-space: pre;
padding-left: 0;
width: 100%;
box-sizing: border-box;
display: flex;
position: relative;
font-variant-ligatures: none;
letter-spacing: 0px;
overflow: visible;
}
:not(pre)>code[class*="language-"],
pre[class*="language-"] {
background: transparent !important;
text-shadow: none !important;
padding: 0 !important;
margin: 0 !important;
}
.line-number {
position: sticky;
left: 0;
top: 0;
bottom: 0;
width: 50px;
min-width: 50px;
text-align: right;
color: var(--line-num-text);
background: var(--line-num-bg);
padding-right: 10px;
border-right: 1px solid var(--border-color);
box-sizing: border-box;
user-select: none;
z-index: 20;
}
.selection-layer {
position: absolute;
left: 55px;
top: 0;
bottom: 0;
background-color: transparent;
z-index: 1;
pointer-events: none;
}
.is-selected {
background-color: var(--selection-bg);
}
.line-content {
padding-left: 5px;
position: relative;
z-index: 2;
pointer-events: none;
}
#cursor {
position: absolute;
width: 2px;
height: var(--line-height);
background-color: #6a9955;
border-radius: 0px;
opacity: 1;
z-index: 4;
pointer-events: none;
}
.blink {
animation: blink 1s step-end infinite;
}
#toolbar {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 35px;
background: #0a0807;
border-bottom: 1px solid #1a1614;
display: flex;
align-items: center;
justify-content: center;
padding: 0 5px;
box-sizing: border-box;
z-index: 100;
font-size: 13px;
gap: 5px;
}
#toolbar-right {
margin-left: auto;
display: flex;
align-items: center;
gap: 5px;
position: relative;
z-index: 9999;
overflow: visible;
padding-right: 0;
height: 100%;
}
.stats-anchor {
width: 0;
overflow: visible;
white-space: nowrap;
display: flex;
align-items: center;
position: relative;
}
#search-stats {
color: #858585;
font-size: 12px;
margin-left: 10px;
pointer-events: none;
}
#toolbar input {
background: #1e1e1e;
border: 1px solid #333;
color: #d4d4d4;
padding: 4px 6px;
border-radius: 2px;
outline: none;
font-family: sans-serif;
}
#toolbar input:focus {
border-color: #007acc;
}
#toolbar button {
background: #2d2d2d;
border: 1px solid #333;
color: #d4d4d4;
padding: 4px 8px;
border-radius: 2px;
cursor: pointer;
font-size: 12px;
}
#toolbar button:hover {
background: #3d3d3d;
}
#toolbar button:active {
background: #007acc;
color: white;
}
#statusbar {
position: fixed;
bottom: 0;
left: 0;
width: 100%;
height: 30px;
background: #0a0807;
color: #558b2f;
font-size: 13px;
padding: 0 5px;
font-family: sans-serif;
z-index: 100;
display: flex;
justify-content: space-between;
align-items: center;
box-sizing: border-box;
border-top: 1px solid #1a1614;
}
#file-status {
flex: 1;
text-align: left;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}
#message-area {
flex: 1;
text-align: right;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}
#shortcuts {
flex: 0 0 auto;
display: flex;
gap: 4px;
align-items: center;
}
#shortcuts button {
background: #2d2d2d;
border: 1px solid #333;
color: #d4d4d4;
padding: 3px 8px;
border-radius: 2px;
cursor: pointer;
font-size: 11px;
}
#shortcuts button:hover {
background: #3d3d3d;
}
#shortcuts button:active {
background: #007acc;
color: white;
}
@keyframes blink {
0%,
100% {
opacity: 1;
}
50% {
opacity: 0;
}
}
.token.comment {
color: #6a9955;
}
.token.string {
color: #ce9178;
}
.token.number {
color: #6bc46d;
}
.token.html-tag {
color: #569cd6;
}
.token.attr-name {
color: #9cdcfe;
}
.token.selector {
color: #d7ba7d;
}
.token.property {
color: #9cdcfe;
}
.token.keyword {
color: #c586c0;
}
.token.function {
color: #dcdcaa;
}
.token.trailing-space {
background-color: rgba(255, 0, 0, 0.3);
border-radius: 2px;
}
.token.emoji {
display: inline-flex;
width: calc(var(--char-width) * 2) !important;
height: var(--line-height);
overflow: hidden;
justify-content: center;
align-items: center;
vertical-align: middle;
font-family: 'Segoe UI Emoji', 'Apple Color Emoji', sans-serif;
font-size: 0.85em;
line-height: 1;
margin-top: -2px;
color: var(--text-color);
border: none;
outline: none;
cursor: default;
}
#measure-line {
position: absolute;
top: -9999px;
left: -9999px;
visibility: hidden;
height: auto;
width: auto;
white-space: pre !important;
font-family: var(--font-family) !important;
font-size: var(--font-size);
font-variant-ligatures: none;
letter-spacing: 0px;
padding-left: 0;
z-index: -100;
overflow: hidden;
}
::-webkit-scrollbar {
width: 8px;
height: 8px;
}
::-webkit-scrollbar-track {
background: transparent;
}
::-webkit-scrollbar-thumb {
background-color: #424242;
border-radius: 4px;
}
::-webkit-scrollbar-thumb:hover {
background-color: #5a5a5a;
}
::-webkit-scrollbar-corner {
background: transparent;
}
.color-popup {
position: absolute;
top: 40px;
right: 5px;
width: 550px;
background: #252526;
border: 1px solid #454545;
border-radius: 4px;
padding: 10px;
box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
z-index: 200;
}
#color-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(20px, 1fr));
gap: 4px;
}
.color-swatch {
width: 20px;
height: 20px;
border-radius: 2px;
cursor: pointer;
border: 1px solid rgba(255, 255, 255, 0.05);
transition: transform 0.1s, border-color 0.1s, box-shadow 0.1s;
}
.color-swatch:hover {
transform: scale(1.4);
border-color: #fff;
z-index: 10;
box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
border-radius: 3px;
}
.line-background {
position: absolute;
left: 0;
right: 0;
top: 0;
bottom: 0;
background-color: rgba(255, 255, 255, 0.03);
pointer-events: none;
z-index: 0;
}
.line-number.active-line {
color: var(--text-color);
font-weight: bold;
border-right: 1px solid var(--c-comment);
}
#input-trap {
position: absolute;
z-index: -1;
opacity: 0;
top: 0;
left: 0;
width: 1px;
height: 1em;
border: none;
outline: none;
resize: none;
overflow: hidden;
font-size: 16px;
transform: scale(0);
}
a {
color: #4fc1ff;
text-decoration: none;
}
a:hover {
color: #fff;
text-decoration: none;
}
.token.trailing-space-mark {
color: #FFB300;
opacity: 0.8;
font-family: var(--font-family);
font-size: var(--font-size);
letter-spacing: 0;
pointer-events: none;
user-select: none;
}
#tabs-bar {
position: fixed;
top: 35px;
left: 0;
width: 100%;
height: 35px;
background-color: #252526;
border-bottom: 1px solid #333;
display: flex;
align-items: center;
overflow: hidden;
z-index: 90;
}
#tabs-container {
display: flex;
overflow-x: auto;
scrollbar-width: none;
max-width: calc(100% - 40px);
}
#tabs-container::-webkit-scrollbar {
display: none;
}
.tab {
display: flex;
align-items: center;
padding: 0 10px;
min-width: 120px;
max-width: 200px;
height: 35px;
background-color: #2d2d2d;
color: #969696;
border-right: 1px solid #1e1e1e;
cursor: pointer;
font-size: 12px;
user-select: none;
white-space: nowrap;
}
.tab.active {
background-color: #1e1e1e;
color: #ffffff;
}
.tab:hover {
background-color: #333;
}
.tab-name {
flex-grow: 1;
overflow: hidden;
text-overflow: ellipsis;
margin-right: 8px;
}
.tab-close {
display: flex;
align-items: center;
justify-content: center;
width: 16px;
height: 16px;
border-radius: 3px;
font-size: 10px;
}
.tab-close:hover {
background-color: #444;
color: #ff5555;
}
.tab.dirty .tab-name::after {
content: " ●";
color: #4fc1ff;
font-size: 12px;
}
#add-tab-btn {
background: none;
border: none;
color: #ccc;
padding: 0 15px;
cursor: pointer;
font-size: 18px;
height: 100%;
flex-shrink: 0;
}
#add-tab-btn:hover {
background-color: #333;
color: white;
}
@keyframes button-pop {
0% {
transform: scale(1);
}
50% {
transform: scale(1.05);
box-shadow: 0 0 15px rgba(79, 193, 255, 0.5);
}
100% {
transform: scale(1);
}
}
.blink-success {
animation: button-pop 0.3s ease-out;
background-color: #2da042 !important;
color: white !important;
border-color: #2da042 !important;
}
</style>

<body>
<div id="toolbar">
<input type="text" id="find-input" placeholder="Find..." autocomplete="one-time-code">
<input type="text" id="replace-input" placeholder="Replace..." autocomplete="one-time-code">
<button onclick="editor.search.findNext()">Next</button>
<button onclick="editor.search.replace()">Replace</button>
<button onclick="editor.search.replaceAll()">All</button>
<button onclick="editor.search.reset()" title="Clear search and highlights">Reset</button>
<div class="stats-anchor">
<span id="search-stats"></span>
</div>
<div id="toolbar-right">
<button onclick="editor.insertSkeleton()" title="Insert HTML5 Template">🧩</button>
<button id="color-btn" onclick="toggleColorPicker()" title="Color Picker">🎨</button>
</div>
</div>
<div id="color-picker" class="color-popup" style="display: none;">
<div id="color-grid"></div>
</div>
<div id="tabs-bar">
<div id="tabs-container"></div>
<button id="add-tab-btn" onclick="editor.addNewTab()" title="New File">+</button>
</div>
<div id="editor" tabindex="0">
<div id="scroll-phantom"></div>
<div id="view-port"></div>
<div id="cursor" class="blink"></div>
</div>
<div id="statusbar">
<span id="cursor-pos" style="flex: 1; font-size: 12px; color: #858585; font-variant-numeric: tabular-nums; padding-left: 5px;">Ln 1, Col 1</span>
<div id="shortcuts">
<button onclick="editor.openFile()" title="Open File (Ctrl+O)">📂 Open</button>
<button onclick="editor.saveFile()" title="Save File (Ctrl+S)">💾 Save</button>
<button onclick="editor.newFile()" style="margin-right: 10px;" title="New File (Ctrl+N)">📄 New</button>
<strong>Cycle</strong>
<button onclick="editor.cycleNext('comment')" title="Jump to next comment">Comments</button>
<button onclick="editor.cycleNext('function')" title="Jump to next function definition" style="margin-right: 10px;">Functions</button>
<strong>Remove</strong>
<button onclick="editor.removeComments()" title="Remove Comments">Comments</button>
<button onclick="editor.removeEmptyLines()" title="Remove Empty Lines">Empty Lines</button>
<button onclick="editor.removeTrailingWhitespace()" title="Remove Trailing Whitespace" style="margin-right: 10px;">Whitespace</button>
</div>
<span id="message-area" style="flex: 1; text-align: right; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;">(C) Johnny Heggelund</span>
</div>
<script>
"use strict";
let EMOJI_REGEX;
try {
EMOJI_REGEX = new RegExp("((?:\\p{Emoji_Presentation}|\\p{Extended_Pictographic}|\\p{Emoji}\\uFE0F)(?:\\p{Emoji_Modifier})?(?:\\u200D(?:\\p{Emoji_Presentation}|\\p{Extended_Pictographic}|\\p{Emoji}\\uFE0F)(?:\\p{Emoji_Modifier})?)*|\\p{Regional_Indicator}\\p{Regional_Indicator})", "gu");
} catch (e) {
EMOJI_REGEX = /((?:[\u2700-\u27BF]|[\u2600-\u26FF]|[\u2300-\u23FF]|[\uD800-\uDBFF][\uDC00-\uDFFF])[\uFE0F]?(?:\u200D(?:[\u2700-\u27BF]|[\u2600-\u26FF]|[\u2300-\u23FF]|[\uD800-\uDBFF][\uDC00-\uDFFF])[\uFE0F]?)*)/g;
}
class SyntaxHighlighter {
constructor() {
this.lineModes = [];
this.lineState = [];
}
analyze(lines, fileName = '') {
let mode = 'html';
let lockedMode = false;
if (fileName.match(/\.(js|mjs|cjs|ts|json)$/i)) {
mode = 'javascript';
lockedMode = true;
} else if (fileName.match(/\.css$/i)) {
mode = 'css';
lockedMode = true;
}
let jsCssState = { comment: false, quote: null, regex: false };
let htmlBlockComment = false;
this.lineModes = new Array(lines.length);
this.lineState = new Array(lines.length);
for (let i = 0; i < lines.length; i++) {
const line = lines[i];
let thisLineMode = mode;
if (!lockedMode) {
if (mode === 'html') {
if (!htmlBlockComment && line.match(/^\s*<script/i)) {
thisLineMode = 'html';
if (!line.match(/<\/script/i)) mode = 'javascript';
} else if (!htmlBlockComment && line.match(/^\s*<style/i)) {
thisLineMode = 'html';
if (!line.match(/<\/style/i)) mode = 'css';
}
} else if (mode === 'javascript') {
if (!jsCssState.comment && !jsCssState.quote && !jsCssState.regex && line.match(/<\/script/i)) {
thisLineMode = 'html';
mode = 'html';
} else {
thisLineMode = 'javascript';
}
} else if (mode === 'css') {
if (!jsCssState.comment && !jsCssState.quote && line.match(/<\/style/i)) {
thisLineMode = 'html';
mode = 'html';
} else {
thisLineMode = 'css';
}
}
}
if (thisLineMode === 'html') {
const state = this.checkHtmlCommentState(line, htmlBlockComment);
this.lineState[i] = htmlBlockComment ? 'html-comment' : null;
htmlBlockComment = state;
if (htmlBlockComment) this.lineState[i] = 'html-comment';
} else {
if (jsCssState.comment) this.lineState[i] = 'comment';
else if (jsCssState.quote) this.lineState[i] = 'string-' + jsCssState.quote;
else this.lineState[i] = null;
jsCssState = this.checkJsCssState(line, jsCssState);
}
this.lineModes[i] = thisLineMode;
}
}
checkJsCssState(line, currentState) {
if (line.length > 5000) return currentState;
let inComment = currentState.comment;
let quoteChar = currentState.quote;
let inRegex = currentState.regex;
let escape = false;
let lastChar = '';
let currentWord = '';
let lastWord = '';
for (let i = 0; i < line.length; i++) {
const char = line[i];
const next = line[i + 1];
if (/[a-zA-Z0-9_$]/.test(char)) { currentWord += char; } else {
if (currentWord.length > 0) lastWord = currentWord;
currentWord = '';
}
if (inComment) {
if (char === '*' && next === '/') { inComment = false; i++; }
} else if (quoteChar) {
if (escape) { escape = false; } else if (char === '\\') { escape = true; } else if (char === quoteChar) { quoteChar = null; }
} else if (inRegex) {
if (escape) { escape = false; } else if (char === '\\') { escape = true; } else if (char === '/') { inRegex = false; }
} else {
if (char === '"' || char === "'" || char === '`') { quoteChar = char; } else if (char === '/' && next === '*') { inComment = true; i++; } else if (char === '/' && next === '/') { break; } else if (char === '/') {
const keywords = ['return', 'case', 'throw', 'await', 'typeof', 'void', 'yield', 'delete'];
const symbols = ['(', '=', ',', ':', '?', '[', '{', '!', '&', '|', ';', '+', '-', '*', '/', '%', '^', '<', '>', '~'];
if (symbols.includes(lastChar) || keywords.includes(lastWord) || lastChar === '') { inRegex = true; }
}
}
if (/\S/.test(char)) lastChar = char;
}
return { comment: inComment, quote: quoteChar, regex: inRegex };
}
checkHtmlCommentState(line, inComment) {
if (line.length > 5000) return inComment;
let state = inComment;
const startMarker = '<' + '!--';
const endMarker = '-' + '->';
for (let i = 0; i < line.length; i++) {
if (state) { if (line.substr(i, 3) === endMarker) { state = false; i += 2; } } else { if (line.substr(i, 4) === startMarker) { state = true; i += 3; } }
}
return state;
}
highlight(text, rowIndex) {
if (!text) return '&nbsp;';
if (text.length > 5000) return this.escapeHTML(text);
const mode = (this.lineModes && this.lineModes[rowIndex]) ? this.lineModes[rowIndex] : 'html';
const state = (this.lineState && this.lineState[rowIndex]) ? this.lineState[rowIndex] : null;
let escaped = this.escapeHTML(text);
if (state === 'comment') {
const endIdx = escaped.indexOf('*/');
if (endIdx === -1) { return '<span class="token comment">' + escaped + '</span>'; } else {
const commentPart = escaped.substring(0, endIdx + 2);
const codePart = escaped.substring(endIdx + 2);
let rest = '';
if (mode === 'javascript') rest = this.highlightJS(codePart);
else if (mode === 'css') rest = this.highlightCSS(codePart);
else rest = codePart;
return '<span class="token comment">' + commentPart + '</span>' + rest;
}
}
if (state && state.startsWith('string-')) {
const quote = state.substring(7);
let esc = false;
let rawEndIdx = -1;
for (let i = 0; i < text.length; i++) {
if (esc) { esc = false; continue; }
if (text[i] === '\\') { esc = true; continue; }
if (text[i] === quote) { rawEndIdx = i; break; }
}
if (rawEndIdx === -1) { return '<span class="token string">' + escaped + '</span>'; } else {
const strPart = this.escapeHTML(text.substring(0, rawEndIdx + 1));
const codePart = this.escapeHTML(text.substring(rawEndIdx + 1));
let rest = '';
if (mode === 'javascript') rest = this.highlightJS(codePart);
else if (mode === 'css') rest = this.highlightCSS(codePart);
else rest = codePart;
return '<span class="token string">' + strPart + '</span>' + rest;
}
}
if (state === 'html-comment') {
const endIdx = escaped.indexOf('-' + '-' + '&gt;');
if (endIdx === -1) { return '<span class="token comment">' + escaped + '</span>'; } else {
const commentPart = escaped.substring(0, endIdx + 6);
const codePart = escaped.substring(endIdx + 6);
return '<span class="token comment">' + commentPart + '</span>' + this.highlightHTMLLine(codePart);
}
}
let result = '';
if (mode === 'javascript') { result = this.highlightJS(escaped); } else if (mode === 'css') { result = this.highlightCSS(escaped); } else { result = this.highlightHTMLLine(escaped); }
result = result.replace(/([ \t]+)$/, (match) => {
const dots = match.replace(/ /g, '·').replace(/\t/g, '→   ');
return '<span class="token trailing-space-mark">' + dots + '</span>';
});
return result.replace(EMOJI_REGEX, '<span class="token emoji" data-emoji="$1">$1</span>');
}
escapeHTML(str) { return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
highlightJS(code) {
const pattern = /((?:^|[:=,(\[{!&|?;]\s*|return\s+|case\s+|throw\s+|await\s+|typeof\s+|void\s+|yield\s+|delete\s+)\/(?![*\/])(?:\\.|[^\\\r\n\/])+\/[gimyus]{0,6})|(\/\*[\s\S]*?\*\/|\/\/.*)|(".*?"|'.*?'|`[\s\S]*?`|`[\s\S]*?$)|(\b(?:const|let|var|function|return|if|else|for|while|class|new|this|async|await|import|export|from|try|catch|switch|case|break|default|typeof|void|delete)\b)|(\b\d+\.?\d*\b)|(\b[a-zA-Z_$][a-zA-Z0-9_$]*(?=\())/g;
return code.replace(pattern, (match, regex, comment, string, keyword, number, func) => {
if (regex) { const slashIdx = regex.indexOf('/'); return regex.substring(0, slashIdx) + '<span class="token string">' + regex.substring(slashIdx) + '</span>'; }
if (comment) return '<span class="token comment">' + comment + '</span>';
if (string) return '<span class="token string">' + string + '</span>';
if (keyword) return '<span class="token keyword">' + keyword + '</span>';
if (number) return '<span class="token number">' + number + '</span>';
if (func) return '<span class="token function">' + func + '</span>';

});
}
