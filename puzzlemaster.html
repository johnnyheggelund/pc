<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puzzle Game</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --surface-color: #1a1a1a;
            --primary-color: #bb86fc;
            --text-color: #e0e0e0;
            --border-radius: 6px;
            --grid-cols: 2;
            --grid-rows: 3;
            --bg-image: url('');
        }
        
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Dynamic Background Framing */
        #ambient-bg {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            filter: blur(40px) brightness(0.25) saturate(0.8);
            z-index: 1;
            transition: background-image 0.8s ease-in-out;
            pointer-events: none;
        }

        /* Splash Screen Overlay */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #121212;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            gap: 25px;
        }
        #splash-screen h2 {
            font-size: 36px;
            letter-spacing: 2px;
            color: var(--primary-color);
            margin: 0;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
            padding: 0;
        }

        button {
            background-color: var(--primary-color);
            color: #000;
            font-weight: bold;
            border: none;
            padding: 16px 45px;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(187, 134, 252, 0.4);
        }
        button:hover { 
            opacity: 0.95; 
            transform: scale(1.03);
            box-shadow: 0 6px 20px rgba(187, 134, 252, 0.6);
        }

        /* Main Center-Aligned Frame */
        .game-viewport {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 1600px; /* Comfortably spans wide monitors without stretching */
            height: 95vh;
            box-sizing: border-box;
        }

        .game-area {
            display: flex;
            background-color: rgba(0, 0, 0, 0.6);
            border-radius: var(--border-radius);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            height: 100%;
        }
        
        /* Strict SDXL 832x1216 scaling */
        .board-container {
            height: 100%;
            aspect-ratio: 832 / 1216;
            background-color: var(--surface-color);
            position: relative;
            box-sizing: border-box;
        }
        #puzzle-board {
            border-right: 2px solid rgba(0, 0, 0, 0.5);
            display: grid;
            grid-template-columns: repeat(var(--grid-cols), 1fr);
            grid-template-rows: repeat(var(--grid-rows), 1fr);
            background-size: 100% 100%;
        }
        #puzzle-board.solved {
            background-image: var(--bg-image);
        }
        #puzzle-board.solved .board-slot,
        #puzzle-board.solved .puzzle-piece {
            opacity: 0;
        }
        .board-slot {
            border: 1px dashed rgba(255, 255, 255, 0.05);
            box-sizing: border-box;
            position: relative;
            width: 100%;
            height: 100%;
        }
        .board-slot.drag-over {
            background-color: rgba(187, 134, 252, 0.2);
        }
        #scatter-area {
            position: relative;
            overflow: hidden;
            background-color: rgba(10, 10, 10, 0.4);
        }
        .puzzle-piece {
            width: calc(100% / var(--grid-cols));
            height: calc(100% / var(--grid-rows));
            background-image: var(--bg-image);
            background-size: calc(var(--grid-cols) * 100%) calc(var(--grid-rows) * 100%);
            background-position:
                calc(var(--x) * 100% / max(1, var(--grid-cols) - 1))
                calc(var(--y) * 100% / max(1, var(--grid-rows) - 1));
            border: 1px solid rgba(255,255,255,0.18);
            box-sizing: border-box;
            cursor: grab;
            position: absolute;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.5);
        }
        .board-slot .puzzle-piece {
            width: 100%;
            height: 100%;
            left: 0 !important;
            top: 0 !important;
            box-shadow: none;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .puzzle-piece:active { cursor: grabbing; }
        .puzzle-piece.dragging {
            opacity: 0.6;
            transform: scale(1.02);
            z-index: 1000 !important;
        }

        /* Floating UI Overlay Elements */
        #ui-overlay {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1500;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            pointer-events: none;
        }
        #message {
            font-size: 32px;
            font-weight: bold;
            color: var(--primary-color);
            text-shadow: 0 4px 8px rgba(0,0,0,0.9);
            min-height: 40px;
            letter-spacing: 1px;
        }
        #nextBtn {
            pointer-events: auto;
            display: none;
        }
        p {
            margin: 0;
    </style>
</head>
<body>

    <!-- Ambient Dynamic Framing Layer -->
    <div id="ambient-bg"></div>

    <!-- Splash Screen -->
    <div id="splash-screen">
        <h2>Jungle Fever</h2>
        <p>sexypuzzle.itch.io</p>
        <button id="startPuzzleBtn">Start Puzzle</button>
    </div>

    <!-- Centered Visual Viewport Framework -->
    <div class="game-viewport">
        <div class="game-area">
            <div id="puzzle-board" class="board-container"></div>
            <div id="scatter-area" class="board-container"></div>
        </div>
    </div>

    <!-- Overlay Alerts -->
    <div id="ui-overlay">
        <div id="message"></div>
        <button id="nextBtn">Next Level</button>
    </div>

    <script>
        // --- 10 Hardcoded SDXL Images Array ---
        const puzzleImages = [
            'https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?q=80&w=832&h=1216&fit=crop',  // Level 1
            'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=832&h=1216&fit=crop',  // Level 2
            'https://images.unsplash.com/photo-1604871000636-074fa5117945?q=80&w=832&h=1216&fit=crop',  // Level 3
            'https://images.unsplash.com/photo-1541701494587-cb58502866ab?q=80&w=832&h=1216&fit=crop',  // Level 4
            'https://images.unsplash.com/photo-1558591710-4b4a1ae0f04d?q=80&w=832&h=1216&fit=crop',  // Level 5
            'https://images.unsplash.com/photo-1549490349-8643362247b5?q=80&w=832&h=1216&fit=crop',  // Level 6
            'https://images.unsplash.com/photo-1515462277126-270d878326e5?q=80&w=832&h=1216&fit=crop',  // Level 7
            'https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=832&h=1216&fit=crop',  // Level 8
            'https://images.unsplash.com/photo-1500485035595-cbe6f645feb1?q=80&w=832&h=1216&fit=crop',  // Level 9
            'https://images.unsplash.com/photo-1536924940846-227afb31e2a5?q=80&w=832&h=1216&fit=crop'   // Level 10
        ];

        // Progressive difficulties (changes every 2 levels)
        const levels = [
            { cols: 2, rows: 3 }, // Level 1
            { cols: 2, rows: 3 }, // Level 2
            { cols: 3, rows: 4 }, // Level 3
            { cols: 3, rows: 4 }, // Level 4
            { cols: 4, rows: 5 }, // Level 5
            { cols: 4, rows: 5 }, // Level 6
            { cols: 5, rows: 6 }, // Level 7
            { cols: 5, rows: 6 }, // Level 8
            { cols: 6, rows: 7 }, // Level 9
            { cols: 6, rows: 7 }  // Level 10
        ];

        let currentLevelIndex = 0;
        let draggedPiece = null;
        let isPlaying = false;
        let topZIndex = 100;
        
        const board = document.getElementById('puzzle-board');
        const scatterArea = document.getElementById('scatter-area');
        const messageDiv = document.getElementById('message');
        const nextBtn = document.getElementById('nextBtn');
        const splashScreen = document.getElementById('splash-screen');
        
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if (type === 'grab') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.05);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                osc.start(); osc.stop(audioCtx.currentTime + 0.05);
            } else if (type === 'drop') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'win') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                osc.frequency.setValueAtTime(554.37, audioCtx.currentTime + 0.15);
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.3);
                osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.45);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1);
                osc.start(); osc.stop(audioCtx.currentTime + 1);
            }
        }

        function startCurrentLevel() {
            board.innerHTML = '';
            board.classList.remove('solved');
            scatterArea.innerHTML = '';
            messageDiv.innerText = '';
            nextBtn.style.display = 'none';
            isPlaying = true;
            topZIndex = 100;

            const currentLevel = levels[currentLevelIndex];
            const currentImg = puzzleImages[currentLevelIndex];

            // Assign root variables for style engines & background frame
            document.documentElement.style.setProperty('--grid-cols', currentLevel.cols);
            document.documentElement.style.setProperty('--grid-rows', currentLevel.rows);
            document.documentElement.style.setProperty('--bg-image', `url(${currentImg})`);

            for (let y = 0; y < currentLevel.rows; y++) {
                for (let x = 0; x < currentLevel.cols; x++) {
                    const id = `piece-${x}-${y}`;
                    
                    const slot = document.createElement('div');
                    slot.classList.add('board-slot');
                    slot.dataset.targetId = id;
                    setupSlotEvents(slot);
                    board.appendChild(slot);

                    const piece = document.createElement('div');
                    piece.classList.add('puzzle-piece');
                    piece.draggable = true;
                    piece.dataset.id = id;
                    piece.style.setProperty('--x', x);
                    piece.style.setProperty('--y', y);
                    setupPieceEvents(piece);
                    placeInScatterArea(piece, currentLevel.cols, currentLevel.rows);
                    scatterArea.appendChild(piece);
                }
            }
        }

        function placeInScatterArea(piece, cols, rows) {
            const pieceWidthPct = 100 / cols;
            const pieceHeightPct = 100 / rows;
            const maxPercentX = 100 - pieceWidthPct;
            const maxPercentY = 100 - pieceHeightPct;
            
            const randomX = Math.random() * maxPercentX;
            const randomY = Math.random() * maxPercentY;
            
            piece.style.left = `${randomX}%`;
            piece.style.top = `${randomY}%`;
            piece.style.zIndex = Math.floor(Math.random() * 50);
        }

        function setupPieceEvents(piece) {
            piece.addEventListener('mousedown', () => {
                topZIndex++;
                piece.style.zIndex = topZIndex;
            });
            piece.addEventListener('dragstart', (e) => {
                if (!isPlaying) { e.preventDefault(); return; }
                initAudio();
                draggedPiece = piece;
                piece.classList.add('dragging');
                playSound('grab');
                e.dataTransfer.setData('text/plain', piece.dataset.id);
                e.dataTransfer.effectAllowed = 'move';
            });
            piece.addEventListener('dragend', () => {
                piece.classList.remove('dragging');
                draggedPiece = null;
            });
        }

        function setupSlotEvents(slot) {
            slot.addEventListener('dragover', (e) => {
                e.preventDefault();
                slot.classList.add('drag-over');
            });
            slot.addEventListener('dragleave', () => {
                slot.classList.remove('drag-over');
            });
            slot.addEventListener('drop', (e) => {
                e.preventDefault();
                slot.classList.remove('drag-over');
                if (draggedPiece) {
                    playSound('drop');
                    let targetSlot = e.target.classList.contains('puzzle-piece')
                        ? e.target.parentElement
                        : e.target;
                        
                    if (targetSlot.children.length > 0 && targetSlot.children[0] !== draggedPiece) {
                        const existingPiece = targetSlot.children[0];
                        scatterArea.appendChild(existingPiece);
                        const currentLevel = levels[currentLevelIndex];
                        placeInScatterArea(existingPiece, currentLevel.cols, currentLevel.rows);
                    }
                    targetSlot.appendChild(draggedPiece);
                    draggedPiece.style.zIndex = 1;
                    checkWin();
                }
            });
        }

        scatterArea.addEventListener('dragover', (e) => e.preventDefault());
        scatterArea.addEventListener('drop', (e) => {
            e.preventDefault();
            if (draggedPiece) {
                playSound('drop');
                const rect = scatterArea.getBoundingClientRect();
                const currentLevel = levels[currentLevelIndex];
                
                const pieceWidth = rect.width / currentLevel.cols;
                const pieceHeight = rect.height / currentLevel.rows;
                
                let pxX = e.clientX - rect.left - (pieceWidth / 2);
                let pxY = e.clientY - rect.top - (pieceHeight / 2);
                
                pxX = Math.max(0, Math.min(pxX, rect.width - pieceWidth));
                pxY = Math.max(0, Math.min(pxY, rect.height - pieceHeight));
                
                const percentX = (pxX / rect.width) * 100;
                const percentY = (pxY / rect.height) * 100;
                
                draggedPiece.style.left = `${percentX}%`;
                draggedPiece.style.top = `${percentY}%`;
                scatterArea.appendChild(draggedPiece);
            }
        });

        function checkWin() {
            const slots = document.querySelectorAll('.board-slot');
            let isWin = true;
            slots.forEach(slot => {
                if (slot.children.length === 0) {
                    isWin = false;
                } else {
                    const piece = slot.children[0];
                    if (slot.dataset.targetId !== piece.dataset.id) {
                        isWin = false;
                    }
                }
            });
            
            if (isWin) {
                isPlaying = false;
                playSound('win');
                board.classList.add('solved');
                
                if (currentLevelIndex < levels.length - 1) {
                    messageDiv.innerText = `Level ${currentLevelIndex + 1} Cleared!`;
                    nextBtn.innerText = `Advance to Level ${currentLevelIndex + 2}`;
                    nextBtn.style.display = 'block';
                } else {
                    messageDiv.innerText = 'Ultimate Puzzle Master! You beat all 10 levels!';
                }
            }
        }

        // --- Event Listeners ---
        document.getElementById('startPuzzleBtn').addEventListener('click', () => {
            initAudio();
            splashScreen.style.display = 'none';
            startCurrentLevel();
        });

        nextBtn.addEventListener('click', () => {
            currentLevelIndex++;
            startCurrentLevel();
        });
    </script>
</body>
</html>
