<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fully Responsive Puzzle Game</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --primary-color: #bb86fc;
            --text-color: #e0e0e0;
            --border-radius: 8px;
            --grid-size: 4;
            --bg-image: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=1024&h=1024&fit=crop');
        }
        body {
            margin: 0;
            padding: 10px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden;
        }
        h1 { margin-bottom: 10px; text-align: center; }
        .controls {
            background-color: var(--surface-color);
            padding: 20px;
            border-radius: var(--border-radius);
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 1024px;
            box-sizing: border-box;
        }
        label { font-weight: bold; }
        select, input[type="file"], button {
            background-color: var(--bg-color);
            color: var(--text-color);
            border: 1px solid #333;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            max-width: 100%;
        }
        button {
            background-color: var(--primary-color);
            color: #000;
            font-weight: bold;
            border: none;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.8; }
        .game-area {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 2100px;
        }
        .board-container {
            flex: 1 1 300px;
            width: 100%;
            max-width: min(1024px, 100%, calc(100vh - 250px));
            aspect-ratio: 1 / 1;
            background-color: var(--surface-color);
            border-radius: var(--border-radius);
            position: relative;
            box-sizing: border-box;
        }
        #puzzle-board {
            border: 2px solid #333;
            display: grid;
            grid-template-columns: repeat(var(--grid-size), 1fr);
            grid-template-rows: repeat(var(--grid-size), 1fr);
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            background-size: 100% 100%;
            transition: box-shadow 0.4s ease, border-color 0.4s ease;
        }
        #puzzle-board.solved {
            background-image: var(--bg-image);
            border-color: var(--primary-color);
            box-shadow: 0 0 30px rgba(187, 134, 252, 0.4);
        }
        #puzzle-board.solved .board-slot,
        #puzzle-board.solved .puzzle-piece {
            opacity: 0;
        }
        .board-slot {
            border: 1px dashed #333;
            box-sizing: border-box;
            position: relative;
            width: 100%;
            height: 100%;
            transition: opacity 0.4s ease;
        }
        .board-slot.drag-over {
            background-color: rgba(187, 134, 252, 0.3);
        }
        #scatter-area {
            border: 2px dashed #555;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .puzzle-piece {
            width: calc(100% / var(--grid-size));
            height: calc(100% / var(--grid-size));
            background-image: var(--bg-image);
            background-size: calc(var(--grid-size) * 100%);
            background-position:
                calc(var(--x) * 100% / max(1, var(--grid-size) - 1))
                calc(var(--y) * 100% / max(1, var(--grid-size) - 1));
            border: 1px solid rgba(255,255,255,0.3);
            box-sizing: border-box;
            cursor: grab;
            box-shadow: 2px 4px 8px rgba(0,0,0,0.8);
            transition: transform 0.1s, opacity 0.4s ease;
            position: absolute;
        }
        .board-slot .puzzle-piece {
            width: calc(100% + 1px);
            height: calc(100% + 1px);
            left: -0.5px !important;
            top: -0.5px !important;
        }
        .puzzle-piece:active { cursor: grabbing; }
        .puzzle-piece.dragging {
            opacity: 0.8;
            transform: scale(1.05);
            z-index: 1000 !important;
        }
        #message {
            margin-top: 10px;
            font-size: 24px;
            font-weight: bold;
            color: var(--primary-color);
            min-height: 30px;
        }
    </style>
</head>
<body>
    <h1>Responsive Drag & Drop Puzzle</h1>
    <div class="controls">
        <div>
            <label for="imageUpload">Upload Image:</label>
            <input type="file" id="imageUpload" accept="image/*">
        </div>
        <div>
            <label for="gridSize">Difficulty:</label>
            <select id="gridSize">
                <option value="3">Easy (3x3)</option>
                <option value="4" selected>Normal (4x4)</option>
                <option value="5">Hard (5x5)</option>
                <option value="6">Expert (6x6)</option>
                <option value="8">Master (8x8)</option>
            </select>
        </div>
        <button id="startBtn">Scatter & Start</button>
    </div>
    <div class="game-area">
        <div id="puzzle-board" class="board-container"></div>
        <div id="scatter-area" class="board-container"></div>
    </div>
    <div id="message"></div>
    <script>
        let gridSize = 4;
        let currentImage = 'https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=1024&h=1024&fit=crop';
        let draggedPiece = null;
        let isPlaying = false;
        let topZIndex = 100;
        const board = document.getElementById('puzzle-board');
        const scatterArea = document.getElementById('scatter-area');
        const messageDiv = document.getElementById('message');
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            if (type === 'grab') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.05);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                osc.start(); osc.stop(audioCtx.currentTime + 0.05);
            } else if (type === 'drop') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'win') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                osc.frequency.setValueAtTime(554.37, audioCtx.currentTime + 0.15);
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.3);
                osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.45);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1);
                osc.start(); osc.stop(audioCtx.currentTime + 1);
            }
        }
        function initGame() {
            initAudio();
            board.innerHTML = '';
            board.classList.remove('solved');
            scatterArea.innerHTML = '';
            messageDiv.innerText = '';
            isPlaying = true;
            topZIndex = 100;
            gridSize = parseInt(document.getElementById('gridSize').value);
            document.documentElement.style.setProperty('--grid-size', gridSize);
            document.documentElement.style.setProperty('--bg-image', `url(${currentImage})`);
            for (let y = 0; y < gridSize; y++) {
                for (let x = 0; x < gridSize; x++) {
                    const id = `piece-${x}-${y}`;
                    const slot = document.createElement('div');
                    slot.classList.add('board-slot');
                    slot.dataset.targetId = id;
                    setupSlotEvents(slot);
                    board.appendChild(slot);
                    const piece = document.createElement('div');
                    piece.classList.add('puzzle-piece');
                    piece.draggable = true;
                    piece.dataset.id = id;
                    piece.style.setProperty('--x', x);
                    piece.style.setProperty('--y', y);
                    setupPieceEvents(piece);
                    placeInScatterArea(piece);
                    scatterArea.appendChild(piece);
                }
            }
        }
        function placeInScatterArea(piece) {
            const piecePercentSize = 100 / gridSize;
            const maxPercent = 100 - piecePercentSize;
            const randomX = Math.random() * maxPercent;
            const randomY = Math.random() * maxPercent;
            piece.style.left = `${randomX}%`;
            piece.style.top = `${randomY}%`;
            piece.style.zIndex = Math.floor(Math.random() * 50);
        }
        function setupPieceEvents(piece) {
            piece.addEventListener('mousedown', () => {
                topZIndex++;
                piece.style.zIndex = topZIndex;
            });
            piece.addEventListener('dragstart', (e) => {
                if (!isPlaying) { e.preventDefault(); return; }
                initAudio();
                draggedPiece = piece;
                piece.classList.add('dragging');
                playSound('grab');
                e.dataTransfer.setData('text/plain', piece.dataset.id);
                e.dataTransfer.effectAllowed = 'move';
            });
            piece.addEventListener('dragend', () => {
                piece.classList.remove('dragging');
                draggedPiece = null;
            });
        }
        function setupSlotEvents(slot) {
            slot.addEventListener('dragover', (e) => {
                e.preventDefault();
                slot.classList.add('drag-over');
            });
            slot.addEventListener('dragleave', () => {
                slot.classList.remove('drag-over');
            });
            slot.addEventListener('drop', (e) => {
                e.preventDefault();
                e.stopPropagation();
                slot.classList.remove('drag-over');
                if (draggedPiece) {
                    playSound('drop');
                    let targetSlot = e.target.classList.contains('puzzle-piece')
                        ? e.target.parentElement
                        : e.target;
                    if (targetSlot.children.length > 0 && targetSlot.children[0] !== draggedPiece) {
                        const existingPiece = targetSlot.children[0];
                        scatterArea.appendChild(existingPiece);
                        placeInScatterArea(existingPiece);
                    }
                    targetSlot.appendChild(draggedPiece);
                    draggedPiece.style.zIndex = 1;
                    checkWin();
                }
            });
        }
        scatterArea.addEventListener('dragover', (e) => e.preventDefault());
        scatterArea.addEventListener('drop', (e) => {
            e.preventDefault();
            if (draggedPiece) {
                playSound('drop');
                const rect = scatterArea.getBoundingClientRect();
                const areaWidth = rect.width;
                const areaHeight = rect.height;
                const pieceWidth = areaWidth / gridSize;
                let pxX = e.clientX - rect.left - (pieceWidth / 2);
                let pxY = e.clientY - rect.top - (pieceWidth / 2);
                pxX = Math.max(0, Math.min(pxX, areaWidth - pieceWidth));
                pxY = Math.max(0, Math.min(pxY, areaHeight - pieceWidth));
                const percentX = (pxX / areaWidth) * 100;
                const percentY = (pxY / areaHeight) * 100;
                draggedPiece.style.left = `${percentX}%`;
                draggedPiece.style.top = `${percentY}%`;
                scatterArea.appendChild(draggedPiece);
            }
        });
        function checkWin() {
            const slots = document.querySelectorAll('.board-slot');
            let isWin = true;
            slots.forEach(slot => {
                if (slot.children.length === 0) {
                    isWin = false;
                } else {
                    const piece = slot.children[0];
                    if (slot.dataset.targetId !== piece.dataset.id) {
                        isWin = false;
                    }
                }
            });
            if (isWin) {
                isPlaying = false;
                playSound('win');
                messageDiv.innerText = 'Puzzle Solved!';
                board.classList.add('solved');
            }
        }
        document.getElementById('startBtn').addEventListener('click', initGame);
        document.getElementById('imageUpload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    currentImage = event.target.result;
                    initGame();
                };
                reader.readAsDataURL(file);
            }
        });
        window.onload = initGame;
    </script>
</body>
</html>
