<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Lander Rescue Mission</title>
<style>
:root {
--bg-color: #040710;
--panel-bg: #0b1221;
--border-color: #1a2642;
--hover-color: #293c61;
--text-color: #a6c2ff;
--accent-color: #4da6ff;
--danger-color: #ff4d4d;
--ui-font: 'Courier New', Courier, monospace;
}
body {
margin: 0;
overflow: hidden;
background-color: var(--bg-color);
color: var(--text-color);
font-family: var(--ui-font);
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
width: 100vw;
user-select: none;
-webkit-user-select: none;
-webkit-touch-callout: none;
touch-action: none;
font-weight: bold;
box-sizing: border-box;
}
canvas {
display: block;
background-color: var(--bg-color);
max-width: 100vw;
max-height: 100vh;
aspect-ratio: 16 / 9;
border: 4px solid var(--border-color);
outline: none;
box-sizing: border-box;
object-fit: contain;
touch-action: none;
}
#ui-overlay {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
display: flex;
justify-content: center;
align-items: center;
text-align: center;
flex-direction: column;
pointer-events: none;
z-index: 10;
}
#start-screen,
#game-over-screen {
pointer-events: auto;
background: var(--panel-bg);
padding: 10px;
border: 4px solid var(--text-color);
box-shadow: 0 0 20px var(--border-color);
max-width: 440px;
width: 90%;
border-radius: 0;
}
.hidden {
display: none !important;
}
p {
margin: 0 0 12px 0;
color: #4da6ff;
font-size: 0.8rem;
}
h1 {
font-size: 26px;
margin: 10px;
color: var(--text-color);
text-transform: uppercase;
letter-spacing: 2px;
text-shadow: none;
}
h2 {
font-size: 16px;
color: var(--danger-color);
margin: 20px 0;
text-transform: uppercase;
}
.instruction-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 6px;
background: var(--bg-color);
padding: 10px;
border: 2px solid var(--border-color);
text-align: left;
font-size: 16px;
margin-bottom: 10px;
}
.instruction-grid div {
display: flex;
align-items: center;
}
.instruction-grid strong {
color: var(--accent-color);
margin-right: 10px;
text-decoration: underline;
}
button {
background: var(--panel-bg);
color: var(--text-color);
border: 3px solid var(--border-color);
padding: 15px 30px;
font-size: 18px;
font-weight: bold;
cursor: pointer;
text-transform: uppercase;
font-family: inherit;
margin-top: 8px;
transition: all 0.2s;
width: 100%;
max-width: 400px;
}
button:hover {
background: var(--hover-color);
color: var(--accent-color);
border-color: var(--accent-color);
}
#high-scores {
margin-top: 8px;
padding-top: 2px;
font-size: 20px;
}
#high-scores h3 {
margin: 0 0 10px 0;
color: var(--accent-color);
font-size: 24px;
}
#score-list {
list-style: none;
padding: 0;
margin: 0;
display: flex;
justify-content: center;
gap: 10px;
color: var(--text-color);
font-size: 18px;
}
#touch-controls {
position: absolute;
bottom: 8%;
left: 0;
width: 100%;
display: flex;
justify-content: space-between;
padding: 0 5%;
box-sizing: border-box;
pointer-events: none;
z-index: 50;
}
#touch-controls .d-pad-left,
#touch-controls .d-pad-right {
display: flex;
gap: 15px;
pointer-events: auto;
}
.touch-btn {
background: rgba(11, 18, 33, 0.5);
border: 3px solid rgba(77, 166, 255, 0.4);
color: rgba(166, 194, 255, 0.6);
font-size: 28px;
width: 70px;
height: 70px;
border-radius: 50%;
display: flex;
justify-content: center;
align-items: center;
user-select: none;
-webkit-user-select: none;
-webkit-touch-callout: none;
touch-action: none;
cursor: pointer;
padding: 0;
margin: 0;
font-family: Arial, sans-serif;
}
.touch-btn:active, .touch-btn.active {
background: rgba(41, 60, 97, 0.8);
border-color: var(--accent-color);
color: var(--accent-color);
}
@media (max-width: 768px) {
#touch-controls {
bottom: 5%;
padding: 0 3%;
}
.touch-btn {
width: 60px;
height: 60px;
font-size: 24px;
border-width: 2px;
}
}
</style>
</head>
<body>
<canvas id="gameCanvas" tabindex="1"></canvas>
<div id="ui-overlay">
<div id="start-screen">
<h1>Lunar Lander</h1>
<div class="instruction-grid">
<div><strong>ARROWS</strong> Thrust/Rotate</div>
<div><strong>SPACE</strong> Shoot</div>
<div><strong>RESCUE</strong> Pick Up</div>
<div><strong>DROP</strong> Deliver</div>
<div><strong>ENEMY</strong> Danger</div>
<div><strong>FUEL</strong> Refuel</div>
</div>
<button onclick="clickStart()">START MISSION</button>
<button id="continue-option" class="hidden" onclick="clickContinue()">
CONTINUE LEVEL <span id="saved-level-display"></span>
</button>
<div id="high-scores">
<h3>High Scores</h3>
<ol id="score-list">
<li>No missions yet</li>
</ol>
</div>
</div>
<div id="game-over-screen" class="hidden">
<h2 id="game-over-title">MISSION FAILED</h2>
<p id="game-over-message" style="font-size: 24px; margin: 20px 0; color: var(--text-color);">You crashed!</p>
<button onclick="clickStart()">TRY AGAIN</button>
<p class="option-text" style="font-size: 18px; color: var(--hover-color); margin-top: 15px;">(Press ESC for Menu)</p>
</div>
</div>
<div id="touch-controls" class="hidden">
<div class="d-pad-left">
<div class="touch-btn" id="btn-left">&#9664;</div>
<div class="touch-btn" id="btn-right">&#9654;</div>
</div>
<div class="d-pad-right">
<div class="touch-btn" id="btn-fire" style="font-size: 24px;">&#9673;</div>
<div class="touch-btn" id="btn-thrust">&#9650;</div>
</div>
</div>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 1280;
canvas.height = 720;
const uiOverlay = document.getElementById('ui-overlay');
const startScreen = document.getElementById('start-screen');
const gameOverScreen = document.getElementById('game-over-screen');
const gameOverTitle = document.getElementById('game-over-title');
const gameOverMessage = document.getElementById('game-over-message');
const scoreList = document.getElementById('score-list');
const continueOption = document.getElementById('continue-option');
const savedLevelDisplay = document.getElementById('saved-level-display');
const touchControls = document.getElementById('touch-controls');
const btnLeft = document.getElementById('btn-left');
const btnRight = document.getElementById('btn-right');
const btnThrust = document.getElementById('btn-thrust');
const btnFire = document.getElementById('btn-fire');
const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
const C_BG = "#040710";
const C_MAIN = "#4da6ff";
const C_DANGER = "#ff4d4d";
const C_WARN = "#ffaa00";
const C_INFO = "#33cc33";
const C_WHITE = "#ffffff";
window.addEventListener('click', () => {
window.focus();
canvas.focus();
if (audioManager.audioCtx && audioManager.audioCtx.state === 'suspended') {
audioManager.audioCtx.resume();
}
});
const HIGH_SCORES_KEY = 'lunarLanderHighScores_en';
const PROGRESS_KEY = 'lunarLanderMaxLevel_en';
let gameState = 'start';
let lander, terrain, stars;
let level = 1;
let score = 0;
let lives = 3;
let camera = { x: 0, y: 0 };
let worldWidth = canvas.width * 3;
let entities = [];
const GRAVITY = 0.003;
const THRUST_POWER = 0.01;
const ROTATION_SPEED = 0.01;
const LIVES_START = 3;
const PEOPLE_PER_TRIP = 5;
const audioManager = {
audioCtx: null,
thrustNode: null,
init() {
if (!this.audioCtx) {
this.audioCtx = new(window.AudioContext || window.webkitAudioContext)();
}
if (this.audioCtx.state === 'suspended') {
this.audioCtx.resume();
}
},
startThrust() {
if (!this.audioCtx || this.thrustNode) return;
const noiseSource = this.audioCtx.createBufferSource();
const bufferSize = this.audioCtx.sampleRate * 2;
const buffer = this.audioCtx.createBuffer(1, bufferSize, this.audioCtx.sampleRate);
const output = buffer.getChannelData(0);
for (let i = 0; i < bufferSize; i++) {
output[i] = Math.random() * 2 - 1;
}
noiseSource.buffer = buffer;
noiseSource.loop = true;
const filter = this.audioCtx.createBiquadFilter();
filter.type = 'lowpass';
filter.frequency.value = 800;
filter.Q.value = 15;
const gainNode = this.audioCtx.createGain();
gainNode.gain.setValueAtTime(0, this.audioCtx.currentTime);
gainNode.gain.linearRampToValueAtTime(0.3, this.audioCtx.currentTime + 0.1);
noiseSource.connect(filter).connect(gainNode).connect(this.audioCtx.destination);
noiseSource.start();
this.thrustNode = { noiseSource, gainNode };
},
stopThrust() {
if (!this.thrustNode) return;
this.thrustNode.gainNode.gain.linearRampToValueAtTime(0, this.audioCtx.currentTime + 0.2);
this.thrustNode.noiseSource.stop(this.audioCtx.currentTime + 0.2);
this.thrustNode = null;
},
playExplosion() {
if (!this.audioCtx) return;
const noiseSource = this.audioCtx.createBufferSource();
const bufferSize = this.audioCtx.sampleRate;
const buffer = this.audioCtx.createBuffer(1, bufferSize, this.audioCtx.sampleRate);
const output = buffer.getChannelData(0);
for (let i = 0; i < bufferSize; i++) { output[i] = Math.random() * 2 - 1; }
noiseSource.buffer = buffer;
const gainNode = this.audioCtx.createGain();
gainNode.gain.setValueAtTime(0.5, this.audioCtx.currentTime);
gainNode.gain.exponentialRampToValueAtTime(0.001, this.audioCtx.currentTime + 1.0);
noiseSource.connect(gainNode).connect(this.audioCtx.destination);
noiseSource.start();
},
playLand() {
if (!this.audioCtx) return;
const osc = this.audioCtx.createOscillator();
const gain = this.audioCtx.createGain();
osc.type = 'sine';
osc.frequency.setValueAtTime(150, this.audioCtx.currentTime);
osc.frequency.exponentialRampToValueAtTime(50, this.audioCtx.currentTime + 0.2);
gain.gain.setValueAtTime(0.4, this.audioCtx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.001, this.audioCtx.currentTime + 0.3);
osc.connect(gain).connect(this.audioCtx.destination);
osc.start();
osc.stop(this.audioCtx.currentTime + 0.3);
},
playPickup() {
if (!this.audioCtx) return;
const osc = this.audioCtx.createOscillator();
const gain = this.audioCtx.createGain();
osc.type = 'square';
osc.frequency.setValueAtTime(400, this.audioCtx.currentTime);
osc.frequency.linearRampToValueAtTime(800, this.audioCtx.currentTime + 0.1);
gain.gain.setValueAtTime(0.2, this.audioCtx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.001, this.audioCtx.currentTime + 0.2);
osc.connect(gain).connect(this.audioCtx.destination);
osc.start();
osc.stop(this.audioCtx.currentTime + 0.2);
},
playDropoff() {
if (!this.audioCtx) return;
const osc = this.audioCtx.createOscillator();
const gain = this.audioCtx.createGain();
osc.type = 'triangle';
osc.frequency.setValueAtTime(800, this.audioCtx.currentTime);
osc.frequency.linearRampToValueAtTime(400, this.audioCtx.currentTime + 0.2);
gain.gain.setValueAtTime(0.3, this.audioCtx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.001, this.audioCtx.currentTime + 0.3);
osc.connect(gain).connect(this.audioCtx.destination);
osc.start();
osc.stop(this.audioCtx.currentTime + 0.3);
},
playShoot() {
if (!this.audioCtx) return;
const osc = this.audioCtx.createOscillator();
const gain = this.audioCtx.createGain();
osc.type = 'sawtooth';
osc.frequency.setValueAtTime(600, this.audioCtx.currentTime);
osc.frequency.exponentialRampToValueAtTime(100, this.audioCtx.currentTime + 0.1);
gain.gain.setValueAtTime(0.1, this.audioCtx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.001, this.audioCtx.currentTime + 0.1);
osc.connect(gain).connect(this.audioCtx.destination);
osc.start();
osc.stop(this.audioCtx.currentTime + 0.1);
}
};
const keys = { ArrowUp: false, ArrowLeft: false, ArrowRight: false, Space: false };
function saveProgress(lvl) {
const saved = loadProgress();
if (lvl > saved && lvl <= 50) {
localStorage.setItem(PROGRESS_KEY, lvl);
}
}
function loadProgress() {
const saved = localStorage.getItem(PROGRESS_KEY);
return saved ? parseInt(saved) : 1;
}
function updateStartScreenUI() {
const savedLvl = loadProgress();
if (savedLvl > 1) {
continueOption.classList.remove('hidden');
savedLevelDisplay.textContent = savedLvl;
} else {
continueOption.classList.add('hidden');
}
displayHighScores();
}
window.addEventListener('keydown', (e) => {
if (audioManager.audioCtx && audioManager.audioCtx.state === 'suspended') {
audioManager.audioCtx.resume();
}
if (e.code === 'Enter') {
if (gameState === 'start') {
startGame(1);
} else if (gameState === 'gameOver') {
startGame(level);
} else if (gameState === 'levelComplete') {
startGame(level + 1);
}
}
if (e.code === 'KeyC' && gameState === 'start') {
const savedLvl = loadProgress();
if (savedLvl > 1) startGame(savedLvl);
}
if (e.code === 'KeyL' && gameState === 'start') {
const input = prompt("Enter level (1-50):", "1");
const selectedLevel = parseInt(input, 10);
if (!isNaN(selectedLevel) && selectedLevel >= 1 && selectedLevel <= 50) {
startGame(selectedLevel);
} else if (input !== null) {
alert("Invalid level. Please enter a number between 1 and 50.");
}
}
if (e.code === 'Escape' && (gameState === 'gameOver' || gameState === 'playing')) {
gameState = 'start';
audioManager.stopThrust();
uiOverlay.classList.remove('hidden');
startScreen.classList.remove('hidden');
gameOverScreen.classList.add('hidden');
touchControls.classList.add('hidden');
updateStartScreenUI();
}
if (keys.hasOwnProperty(e.code) && gameState === 'playing' && !lander.crashed) {
if (e.code === 'ArrowUp' && !keys.ArrowUp) {
audioManager.startThrust();
}
keys[e.code] = true;
}
});
window.addEventListener('keyup', (e) => {
if (keys.hasOwnProperty(e.code)) {
if (e.code === 'ArrowUp') {
audioManager.stopThrust();
}
keys[e.code] = false;
}
});
function setupTouch(btn, code) {
const press = (e) => {
if (e.cancelable) e.preventDefault();
if (audioManager.audioCtx && audioManager.audioCtx.state === 'suspended') {
audioManager.audioCtx.resume();
}
if (gameState === 'playing' && !lander.crashed) {
if (code === 'ArrowUp' && !keys.ArrowUp) {
audioManager.startThrust();
}
keys[code] = true;
btn.classList.add('active');
}
};
const release = (e) => {
if (e.cancelable) e.preventDefault();
if (code === 'ArrowUp' && keys.ArrowUp) {
audioManager.stopThrust();
}
keys[code] = false;
btn.classList.remove('active');
};
btn.addEventListener('touchstart', press, { passive: false });
btn.addEventListener('mousedown', press);
btn.addEventListener('touchend', release, { passive: false });
btn.addEventListener('mouseup', release);
btn.addEventListener('mouseleave', release);
btn.addEventListener('touchcancel', release, { passive: false });
}
setupTouch(btnLeft, 'ArrowLeft');
setupTouch(btnRight, 'ArrowRight');
setupTouch(btnThrust, 'ArrowUp');
setupTouch(btnFire, 'Space');
function getMaxLandingVelocity() {
return {
x: Math.max(0.12, 0.4 - (level * 0.0056)),
y: Math.max(0.15, 0.6 - (level * 0.009))
};
}
class Lander {
constructor(x, y) {
this.startX = x;
this.startY = y;
this.width = 24;
this.height = 36;
this.reset();
}
reset() {
this.x = this.startX;
this.y = this.startY;
this.vx = 0.5;
this.vy = 0;
this.angle = 0;
this.thrusting = false;
this.crashed = false;
this.landed = false;
this.fuel = Math.max(400, 1800 - (level * 28));
this.people = 0;
this.fireCooldown = 0;
}
fire() {
if (this.fireCooldown <= 0 && !this.crashed && !this.landed) {
const tipX = this.x + Math.sin(this.angle) * (this.height / 2);
const tipY = this.y - Math.cos(this.angle) * (this.height / 2);
const speed = 8;
const vx = this.vx + Math.sin(this.angle) * speed;
const vy = this.vy - Math.cos(this.angle) * speed;
entities.push(new PlayerProjectile(tipX, tipY, vx, vy));
this.fireCooldown = 15;
audioManager.playShoot();
}
}
applyThrust() {
if (this.fuel > 0 && !this.crashed) {
this.landed = false;
this.vx += Math.sin(this.angle) * THRUST_POWER;
this.vy -= Math.cos(this.angle) * THRUST_POWER;
this.fuel -= 1 + (level * 0.005);
this.thrusting = true;
} else {
this.thrusting = false;
audioManager.stopThrust();
}
}
rotate(direction) {
if(!this.crashed) this.angle += ROTATION_SPEED * direction;
}
update() {
if (this.crashed || this.landed) return;
if (this.fireCooldown > 0) this.fireCooldown--;
this.vy += GRAVITY;
this.x += this.vx;
this.y += this.vy;
}
draw() {
ctx.save();
ctx.translate(this.x, this.y);
ctx.rotate(this.angle);
const w = this.width;
const h = this.height;
ctx.strokeStyle = this.crashed ? C_DANGER : C_MAIN;
ctx.lineWidth = 3;
if (this.thrusting && !this.crashed) {
ctx.beginPath();
const flameHeight = h * (0.6 + Math.random() * 0.4);
ctx.moveTo(-w / 3, h / 2);
ctx.lineTo(0, h / 2 + flameHeight);
ctx.lineTo(w / 3, h / 2);
ctx.stroke();
}
ctx.beginPath();
ctx.moveTo(0, -h / 2);
ctx.lineTo(w / 2, h / 2);
ctx.lineTo(-w / 2, h / 2);
ctx.closePath();
ctx.fillStyle = C_BG;
ctx.fill();
ctx.stroke();
ctx.beginPath();
ctx.moveTo(-w / 2, h / 4);
ctx.lineTo(w / 2, h / 4);
ctx.stroke();
if (this.people > 0) {
ctx.fillStyle = C_WHITE;
ctx.beginPath();
ctx.arc(0, h / 8, 3, 0, Math.PI * 2);
ctx.fill();
}
ctx.restore();
}
}
class LandingPad {
constructor(x, y, width, type) {
this.x = x;
this.y = y;
this.width = width;
this.type = type;
this.color = {
'rescue': C_INFO,
'dropoff': C_MAIN,
'fuel': C_WARN
}[type];
}
draw() {
ctx.beginPath();
ctx.moveTo(this.x, this.y);
ctx.lineTo(this.x + this.width, this.y);
ctx.strokeStyle = this.color;
ctx.lineWidth = 6;
ctx.stroke();
ctx.fillStyle = this.color;
ctx.font = "20px Consolas, monospace";
ctx.textAlign = "center";
let letter = "";
if (this.type === 'rescue') letter = "RESCUE";
if (this.type === 'dropoff') letter = "DROP";
if (this.type === 'fuel') letter = "FUEL";
ctx.fillText(letter, this.x + this.width / 2, this.y + 25);
}
}
class EnemyLauncher {
constructor(x, y) {
this.x = x;
this.y = y;
this.width = 30;
this.height = 15;
this.fireCooldown = 0;
}
canFire(target) {
let overPad = false;
for (const e of entities) {
if (e instanceof LandingPad) {
if (target.x > e.x - 30 && target.x < e.x + e.width + 30) {
overPad = true;
break;
}
}
}
const heightAboveGround = getTerrainYAtX(target.x) - target.y;
if (overPad && heightAboveGround < 180) return false;
const startX = this.x;
const startY = this.y - this.height;
const endX = target.x;
const endY = target.y;
const dist = Math.hypot(endX - startX, endY - startY);
const steps = Math.max(15, Math.floor(dist / 20));
for (let i = 1; i <= steps; i++) {
const checkX = startX + (endX - startX) * (i / steps);
const checkY = startY + (endY - startY) * (i / steps);
if (getTerrainYAtX(checkX) < checkY) {
return false;
}
}
return true;
}
update() {
this.fireCooldown--;
if (this.fireCooldown <= 0 && lander && !lander.crashed) {
const dist = Math.abs(lander.x - this.x);
if (dist < canvas.width * 0.6) {
if (this.canFire(lander)) {
this.fire();
this.fireCooldown = Math.max(30, 180 - (level * 2.8) + Math.random() * 40);
} else {
this.fireCooldown = 20;
}
}
}
}
fire() {
const inaccuracy = Math.max(0, 120 - (level * 2.5));
const projSpeed = 1.5 + (level * 0.06);
const dist = Math.hypot(lander.x - this.x, lander.y - (this.y - this.height));
const timeToHit = dist / projSpeed;
let leadX = 0;
let leadY = 0;
if (level > 10) {
const predictStrength = Math.min(1.0, (level - 10) * 0.03);
leadX = lander.vx * timeToHit * predictStrength;
leadY = lander.vy * timeToHit * predictStrength;
}
const targetX = lander.x + leadX + (Math.random() - 0.5) * inaccuracy;
const targetY = lander.y + leadY + (Math.random() - 0.5) * inaccuracy;
entities.push(new Projectile(this.x, this.y - this.height, targetX, targetY, projSpeed));
}
draw() {
ctx.strokeStyle = C_DANGER;
ctx.lineWidth = 3;
ctx.strokeRect(this.x - this.width / 2, this.y - this.height, this.width, this.height);
ctx.beginPath();
ctx.moveTo(this.x, this.y - this.height);
ctx.lineTo(this.x, this.y - this.height - 10);
ctx.stroke();
}
}
class Projectile {
constructor(x, y, targetX, targetY, speed) {
this.x = x;
this.y = y;
const angle = Math.atan2(targetY - y, targetX - x);
this.vx = Math.cos(angle) * speed;
this.vy = Math.sin(angle) * speed;
this.size = 4;
this.life = 400;
}
update() {
this.x += this.vx;
this.y += this.vy;
this.life--;
}
draw() {
ctx.fillStyle = C_DANGER;
ctx.beginPath();
ctx.arc(this.x, this.y, this.size, 0, 2 * Math.PI);
ctx.fill();
}
}
class PlayerProjectile {
constructor(x, y, vx, vy) {
this.x = x;
this.y = y;
this.vx = vx;
this.vy = vy;
this.size = 3;
this.life = 100;
}
update() {
this.x += this.vx;
this.y += this.vy;
this.life--;
}
draw() {
ctx.fillStyle = C_MAIN;
ctx.beginPath();
ctx.arc(this.x, this.y, this.size, 0, 2 * Math.PI);
ctx.fill();
}
}
class Particle {
constructor(x, y) {
this.x = x;
this.y = y;
const angle = Math.random() * Math.PI * 2;
const speed = Math.random() * 6 + 1;
this.vx = Math.cos(angle) * speed;
this.vy = Math.sin(angle) * speed;
this.size = Math.random() * 5 + 2;
this.life = 1.0;
this.decay = Math.random() * 0.03 + 0.01;
this.color = Math.random() > 0.5 ? C_WARN : (Math.random() > 0.5 ? C_DANGER : C_WHITE);
}
update() {
this.x += this.vx;
this.y += this.vy;
this.vy += GRAVITY * 15;
this.life -= this.decay;
}
draw() {
if (this.life <= 0) return;
ctx.save();
ctx.globalAlpha = Math.max(0, this.life);
ctx.fillStyle = this.color;
ctx.beginPath();
ctx.arc(this.x, this.y, this.size, 0, 2 * Math.PI);
ctx.fill();
ctx.restore();
}
}
class Person {
constructor(x, y, state) {
this.x = x;
this.y = y - 10;
this.width = 6;
this.height = 10;
this.state = state;
this.targetX = x;
this.speed = 0.5;
}
update() {
if (this.state === 'walkingToLander' && lander && !lander.crashed) {
this.targetX = lander.x;
if (Math.abs(this.x - this.targetX) < 5) {
this.state = 'safe';
lander.people++;
audioManager.playPickup();
} else if (this.x < this.targetX) {
this.x += this.speed;
} else {
this.x -= this.speed;
}
} else if (this.state === 'walkingAway') {
if (Math.abs(this.x - this.targetX) < 5) {
this.state = 'safe';
} else if (this.x < this.targetX) {
this.x += this.speed;
} else {
this.x -= this.speed;
}
}
}
draw() {
if (this.state === 'waiting' || this.state === 'walkingToLander' || this.state === 'walkingAway') {
ctx.fillStyle = C_INFO;
ctx.fillRect(this.x, this.y, this.width, this.height);
}
}
}
function generateStars() {
stars = [];
for (let i = 0; i < 200; i++) {
stars.push({
x: Math.random() * worldWidth,
y: Math.random() * canvas.height,
size: Math.random() * 2 + 1,
parallax: Math.random() * 0.5 + 0.1
});
}
}
function generateLevel(level) {
entities = [];
const segments = 450;
const roughness = 0.15 + (level * 0.012);
const padWidthSegments = Math.max(4, 20 - Math.floor(level * 0.32));
const bufferSegments = 5;
const padWidth = (padWidthSegments / segments) * worldWidth;
const padIndices = [
Math.floor(segments * 0.2) + Math.floor(Math.random() * 20 - 10),
Math.floor(segments * 0.5) + Math.floor(Math.random() * 20 - 10),
Math.floor(segments * 0.8) + Math.floor(Math.random() * 20 - 10)
].map(idx => {
if (idx + padWidthSegments + (bufferSegments * 2) > segments) {
return segments - (padWidthSegments + (bufferSegments * 2)) - 1;
}
return Math.max(0, idx);
});
const padTypes = ['rescue', 'fuel', 'dropoff'];
const points = [];
let y = canvas.height * (0.6 + Math.random() * 0.2);
let currentPad = 0;
let flatSegmentsLeft = 0;
for (let i = 0; i <= segments; i++) {
points.push({ x: (i / segments) * worldWidth, y: y });
if (currentPad < padIndices.length && i === padIndices[currentPad]) {
flatSegmentsLeft = padWidthSegments + (bufferSegments * 2);
currentPad++;
}
if (flatSegmentsLeft > 0) {
flatSegmentsLeft--;
} else {
y += (Math.random() - 0.5) * canvas.height * roughness;
if (y < canvas.height * 0.4) y = canvas.height * 0.4;
if (y > canvas.height - 40) y = canvas.height - 40;
}
}
terrain = { points };
padIndices.forEach((startIndex, i) => {
const padY = points[startIndex].y;
const padX = points[startIndex + bufferSegments].x;
const padType = padTypes[i];
entities.push(new LandingPad(padX, padY, padWidth, padType));
if (padType === 'rescue') {
for (let p = 0; p < PEOPLE_PER_TRIP; p++) {
const personX = padX + (padWidth / 2) + (Math.random() * 80 - 40);
entities.push(new Person(personX, padY, 'waiting'));
}
}
});
const numEnemies = Math.floor(Math.max(0, level - 2) * 0.4);
const padBuffer = canvas.width / 4;
const bomberFlatSegments = 5;
const halfBomberWidth = Math.floor(bomberFlatSegments / 2);
let tries = 0;
for (let i = 0; i < numEnemies; i++) {
if (tries > 500) break;
tries++;
const safeZoneSegments = Math.floor(segments * 0.15);
const segRange = segments - bomberFlatSegments - safeZoneSegments * 2;
const enemySeg = Math.floor(Math.random() * segRange) + safeZoneSegments + halfBomberWidth;
const enemyX = points[enemySeg].x;
let localMinY = canvas.height;
for (let j = -halfBomberWidth; j <= halfBomberWidth; j++) {
if(points[enemySeg + j].y < localMinY) localMinY = points[enemySeg + j].y;
}
let tooCloseToPad = false;
for (let j = -halfBomberWidth; j <= halfBomberWidth; j++) {
const checkX = points[enemySeg + j].x;
if (entities.some(e => e instanceof LandingPad && checkX > (e.x - padBuffer) && checkX < (e.x + e.width + padBuffer))) {
tooCloseToPad = true;
break;
}
}
if (!tooCloseToPad) {
for (let j = -halfBomberWidth; j <= halfBomberWidth; j++) {
points[enemySeg + j].y = localMinY;
}
entities.push(new EnemyLauncher(enemyX, localMinY));
tries = 0;
} else {
i--;
}
}
}
function drawTerrain() {
ctx.beginPath();
ctx.moveTo(0, canvas.height);
ctx.lineTo(terrain.points[0].x, terrain.points[0].y);
for (let i = 1; i < terrain.points.length; i++) {
ctx.lineTo(terrain.points[i].x, terrain.points[i].y);
}
ctx.lineTo(worldWidth, canvas.height);
ctx.closePath();
ctx.fillStyle = C_BG;
ctx.fill();
ctx.strokeStyle = C_MAIN;
ctx.lineWidth = 3;
ctx.stroke();
}
function drawStars() {
ctx.save();
ctx.fillStyle = C_WHITE;
stars.forEach(star => {
const starX = (star.x - camera.x * star.parallax) % worldWidth;
const drawX = (starX < 0) ? starX + worldWidth : starX;
ctx.globalAlpha = star.parallax;
ctx.fillRect(drawX, star.y - camera.y * star.parallax, star.size, star.size);
});
ctx.restore();
}
function drawHUD() {
ctx.fillStyle = C_MAIN;
ctx.font = "bold 24px Consolas, monospace";
ctx.textAlign = 'left';
ctx.fillText(`LEVEL: ${level}`, 20, 35);
ctx.fillText(`SCORE: ${score}`, 20, 65);
ctx.fillText(`LIVES: ${lives}`, 20, 95);
const peopleColor = lander.people === PEOPLE_PER_TRIP ? C_MAIN : C_WHITE;
ctx.fillStyle = peopleColor;
ctx.fillText(`PEOPLE: ${lander.people}/${PEOPLE_PER_TRIP}`, 20, 125);
const maxVel = getMaxLandingVelocity();
const labelX = canvas.width - 260;
const valueX = canvas.width - 20;
ctx.fillStyle = C_MAIN;
ctx.textAlign = 'left';
ctx.fillText('FUEL:', labelX, 35);
ctx.textAlign = 'right';
ctx.fillStyle = lander.fuel < 400 ? (lander.fuel < 100 ? C_DANGER : C_WARN) : C_MAIN;
ctx.fillText(Math.max(0, Math.round(lander.fuel)), valueX, 35);
ctx.fillStyle = C_MAIN;
ctx.textAlign = 'left';
ctx.fillText('H.SPD:', labelX, 65);
ctx.textAlign = 'right';
ctx.fillStyle = Math.abs(lander.vx) > maxVel.x ? C_DANGER : C_MAIN;
ctx.fillText(`${(Math.abs(lander.vx) * 10).toFixed(1)} / ${(maxVel.x * 10).toFixed(1)}`, valueX, 65);
ctx.fillStyle = C_MAIN;
ctx.textAlign = 'left';
ctx.fillText('V.SPD:', labelX, 95);
ctx.textAlign = 'right';
ctx.fillStyle = Math.abs(lander.vy) > maxVel.y ? C_DANGER : C_MAIN;
ctx.fillText(`${(Math.abs(lander.vy) * 10).toFixed(1)} / ${(maxVel.y * 10).toFixed(1)}`, valueX, 95);
}
function loadHighScores() {
const scoresJSON = localStorage.getItem(HIGH_SCORES_KEY);
return scoresJSON ? JSON.parse(scoresJSON) : [];
}
function saveHighScore(newScore) {
if (newScore === 0) return;
let scores = loadHighScores();
scores.push(newScore);
scores.sort((a, b) => b - a);
scores = scores.slice(0, 3);
localStorage.setItem(HIGH_SCORES_KEY, JSON.stringify(scores));
}
function displayHighScores() {
const scores = loadHighScores();
if (scores.length > 0) {
scoreList.innerHTML = scores.map(s => `<li>${s}</li>`).join('');
} else {
scoreList.innerHTML = "<li>No missions yet</li>";
}
}
function getTerrainYAtX(x) {
if (!terrain || !terrain.points) return canvas.height;
if (x <= 0) return terrain.points[0].y;
if (x >= worldWidth) return terrain.points[terrain.points.length - 1].y;
for (let i = 0; i < terrain.points.length - 1; i++) {
const p1 = terrain.points[i];
const p2 = terrain.points[i + 1];
if (x >= p1.x && x <= p2.x) {
return p1.y + (p2.y - p1.y) * ((x - p1.x) / (p2.x - p1.x));
}
}
return canvas.height;
}
function checkCollisions() {
if (!lander || lander.crashed) return;
let crashedIntoTerrain = false;
let collisionY = canvas.height;
const cos = Math.cos(lander.angle);
const sin = Math.sin(lander.angle);
const h2 = lander.height / 2;
const w2 = lander.width / 2;
for (let i = 0; i <= 4; i++) {
const offsetX = -w2 + (lander.width * (i / 4));
const offsetY = h2;
const pX = lander.x + offsetX * cos - offsetY * sin;
const pY = lander.y + offsetX * sin + offsetY * cos;
const tY = getTerrainYAtX(pX);
if (pY >= tY) {
collisionY = Math.min(collisionY, tY);
crashedIntoTerrain = true;
}
}
if (lander.y > getTerrainYAtX(lander.x)) crashedIntoTerrain = true;
for (let index = entities.length - 1; index >= 0; index--) {
const entity = entities[index];
if (entity instanceof EnemyLauncher) {
if (Math.abs(lander.x - entity.x) < entity.width/2 + w2 &&
Math.abs(lander.y - (entity.y - entity.height/2)) < entity.height/2 + h2) {
handleCrash("Hit an enemy structure!");
}
} else if (entity instanceof Projectile) {
const dist = Math.hypot(entity.x - lander.x, entity.y - lander.y);
const landerRadius = Math.min(w2, h2) + 2;
if (dist < entity.size + landerRadius) {
entities.splice(index, 1);
handleCrash("Hit by enemy fire!");
} else if (entity.life <= 0) {
entities.splice(index, 1);
}
} else if (entity instanceof PlayerProjectile) {
let hit = false;
for (let eIdx = entities.length - 1; eIdx >= 0; eIdx--) {
const e = entities[eIdx];
if (e instanceof EnemyLauncher) {
if (Math.abs(entity.x - e.x) < e.width/2 &&
Math.abs(entity.y - (e.y - e.height/2)) < e.height/2) {
entities.splice(eIdx, 1);
hit = true;
if (eIdx < index) index--;
for (let p = 0; p < 40; p++) {
entities.push(new Particle(e.x, e.y - e.height/2));
}
audioManager.playExplosion();
score += 500;
break;
}
}
}
if (hit || entity.life <= 0 || entity.y > getTerrainYAtX(entity.x)) {
entities.splice(index, 1);
}
} else if (entity instanceof Particle) {
if (entity.life <= 0) entities.splice(index, 1);
}
}
if (crashedIntoTerrain && !lander.landed) {
handleLanding(collisionY);
}
if (lander.x < 0 || lander.x > worldWidth || lander.y < -canvas.height) {
handleCrash("Lost in space!");
}
}
function handleLanding(groundY) {
if (lander.crashed) return;
audioManager.stopThrust();
const cos = Math.cos(lander.angle);
const sin = Math.sin(lander.angle);
const h2 = lander.height / 2;
const w2 = lander.width / 2;
const leftLegX = lander.x + (-w2 * cos) - (h2 * sin);
const rightLegX = lander.x + (w2 * cos) - (h2 * sin);
const tYLeft = getTerrainYAtX(leftLegX);
const tYRight = getTerrainYAtX(rightLegX);
const isFlat = Math.abs(tYLeft - tYRight) < 3;
const maxVel = getMaxLandingVelocity();
const safeAngle = Math.abs(lander.angle) < 0.2;
const safeVelocity = Math.abs(lander.vx) < maxVel.x && Math.abs(lander.vy) < maxVel.y;
let padLandedOn = null;
entities.forEach(e => {
if (e instanceof LandingPad) {
if (rightLegX > e.x && leftLegX < e.x + e.width) {
padLandedOn = e;
}
}
});
if (padLandedOn) {
if (leftLegX >= padLandedOn.x - 2 && rightLegX <= padLandedOn.x + padLandedOn.width + 2) {
if (safeAngle && safeVelocity) {
lander.y = padLandedOn.y - lander.height / 2;
lander.landed = true;
lander.vx = 0;
lander.vy = 0;
lander.angle = 0;
switch (padLandedOn.type) {
case 'rescue':
entities.forEach(e => {
if (e instanceof Person && e.state === 'waiting') {
e.state = 'walkingToLander';
}
});
break;
case 'dropoff':
if (lander.people > 0) {
const droppedCount = lander.people;
for (let i = 0; i < droppedCount; i++) {
const p = new Person(lander.x, padLandedOn.y, 'walkingAway');
p.targetX = padLandedOn.x + (Math.random() * padLandedOn.width);
entities.push(p);
}
audioManager.playDropoff();
const fuelBonus = Math.round(lander.fuel * 2);
const landingBonus = 500 * droppedCount;
const levelBonus = level * 1000;
score += fuelBonus + landingBonus + levelBonus;
lander.people = 0;
saveProgress(level + 1);
if (level === 50) {
setTimeout(() => {
gameState = 'gameOver';
saveHighScore(score);
showEndScreen("CONGRATULATIONS!", `You beat the game! Final Score: ${score}`, "Press [ENTER] to play again");
}, 2000);
} else {
setTimeout(() => {
gameState = 'levelComplete';
showEndScreen("MISSION SUCCESSFUL", `Level ${level} complete! Score: ${score}`, "Press [ENTER] for next level");
}, 2000);
}
} else {
audioManager.playLand();
}
break;
case 'fuel':
lander.fuel = Math.max(lander.fuel, Math.max(400, 1800 - (level * 28)));
audioManager.playPickup();
break;
}
} else {
handleCrash(!safeAngle ? "Bad landing angle!" : "Landed too fast!");
}
} else {
handleCrash("One leg missed the pad!");
}
} else {
if (isFlat && safeAngle && safeVelocity) {
lander.y = groundY - lander.height / 2;
lander.landed = true;
lander.vx = 0;
lander.vy = 0;
lander.angle = 0;
audioManager.playLand();
} else {
if (!isFlat) handleCrash("Terrain isn't flat enough!");
else if (!safeAngle) handleCrash("Bad landing angle!");
else handleCrash("Landed too fast!");
}
}
}
function handleCrash(message) {
if (lander.crashed) return;
lander.crashed = true;
for (let p = 0; p < 80; p++) {
entities.push(new Particle(lander.x, lander.y));
}
audioManager.playExplosion();
lives--;
audioManager.stopThrust();
keys.ArrowUp = false;
setTimeout(() => {
if (lives <= 0) {
gameState = 'gameOver';
saveHighScore(score);
showEndScreen("MISSION FAILED", message, "Press [ENTER] to retry level " + level);
} else {
generateLevel(level);
lander.reset();
}
}, 1500);
}
function startGame(startLevel) {
level = startLevel;
if (gameState === 'start' || gameState === 'gameOver') {
score = 0;
lives = LIVES_START;
}
audioManager.init();
entities = [];
generateLevel(level);
lander = new Lander(100, 50);
lander.vx = 0.5;
gameState = 'playing';
uiOverlay.classList.add('hidden');
startScreen.classList.add('hidden');
gameOverScreen.classList.add('hidden');
if (isTouchDevice) {
touchControls.classList.remove('hidden');
}
canvas.focus();
}
function showEndScreen(title, message, prompt) {
displayHighScores();
gameOverTitle.textContent = title;
gameOverMessage.textContent = message;
const btn = gameOverScreen.querySelector('button');
if (title.includes("SUCCESSFUL") || title.includes("CONGRATULATIONS")) {
btn.textContent = "NEXT MISSION";
} else {
btn.textContent = "TRY AGAIN";
}
gameOverScreen.classList.remove('hidden');
uiOverlay.classList.remove('hidden');
startScreen.classList.add('hidden');
touchControls.classList.add('hidden');
}
function updateCamera() {
camera.x = lander.x - canvas.width / 2;
camera.x = Math.max(0, Math.min(camera.x, worldWidth - canvas.width));
camera.y = 0;
}
function gameLoop() {
if (gameState === 'playing') {
lander.thrusting = false;
if (keys.ArrowUp) lander.applyThrust();
if (keys.Space) lander.fire();
if (keys.ArrowLeft && !lander.landed) lander.rotate(-1);
if (keys.ArrowRight && !lander.landed) lander.rotate(1);
lander.update();
entities.forEach(e => {
if (typeof e.update === 'function') e.update();
});
checkCollisions();
updateCamera();
}
ctx.clearRect(0, 0, canvas.width, canvas.height);
drawStars();
if (gameState !== 'start') {
ctx.save();
ctx.translate(-camera.x, -camera.y);
drawTerrain();
entities.forEach(e => e.draw());
if (lander) lander.draw();
ctx.restore();
if (gameState === 'playing') drawHUD();
}
requestAnimationFrame(gameLoop);
}
window.clickStart = function() {
canvas.focus();
if (audioManager.audioCtx && audioManager.audioCtx.state === 'suspended') {
audioManager.audioCtx.resume();
}
if (gameState === 'start' || gameState === 'gameOver') {
startGame(1);
} else if (gameState === 'levelComplete') {
startGame(level + 1);
}
};
window.clickContinue = function() {
canvas.focus();
if (audioManager.audioCtx && audioManager.audioCtx.state === 'suspended') {
audioManager.audioCtx.resume();
}
const savedLvl = loadProgress();
if (savedLvl > 1) startGame(savedLvl);
};
(function() {
const hideStyle = 'cursor: none !important;';
const showStyle = 'cursor: default !important;';
const setCursor = (style) => {
document.documentElement.style.cssText += style;
document.body.style.cssText += style;
document.querySelectorAll('canvas, iframe, object, embed').forEach(el => {
el.style.cssText += style;
});
};
window.addEventListener('keydown', () => setCursor(hideStyle), true);
window.addEventListener('mousemove', () => setCursor(showStyle), true);
})();
window.addEventListener('keydown', (e) => {
if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
e.preventDefault();
}
}, false);
generateStars();
updateStartScreenUI();
gameLoop();
</script>
