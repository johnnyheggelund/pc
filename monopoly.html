<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Monopoly</title>
<style>
* {
box-sizing: border-box;
touch-action: manipulation;
-webkit-user-select: none;
user-select: none;
-webkit-touch-callout: none;
}
body {
margin: 0; padding: 0;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
background: #111; color: #fff;
height: 100dvh; overflow: hidden;
}
#setup-screen {
position: fixed; top: 0; left: 0; width: 100%; height: 100%;
background: #111; z-index: 1000;
display: flex; flex-direction: column; justify-content: center; align-items: center;
gap: 20px;
}
#setup-screen h1 {
color: #d32f2f; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 3px; font-size: 32px;
}
.menu-btn {
font-size: 18px; padding: 15px 30px; width: 280px;
background: #2196f3; color: white; border: none; border-radius: 8px; font-weight: bold;
}
#app {
display: flex;
flex-direction: row;
height: 100dvh;
width: 100dvw;
overflow: hidden;
}
#ui-panel {
display: flex;
flex-direction: column;
background: #222;
flex: 0 0 320px;
border-right: 2px solid #000;
padding: 15px;
gap: 15px;
z-index: 10;
box-shadow: 4px 0 10px rgba(0,0,0,0.5);
overflow-y: auto;
}
.header-row {
display: flex;
flex-direction: column;
align-items: stretch;
gap: 15px;
}
.player-info {
background: #2a2a2a;
padding: 8px;
border-radius: 8px;
font-size: 15px;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
border: 1px solid #444;
flex: 1;
white-space: nowrap;
overflow: hidden;
}
.p-money { font-weight: bold; color: #4caf50; margin-top: 8px; font-size: 24px; }
.center-controls {
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 12px;
padding: 10px 0;
}
#dice-display {
font-size: 42px;
letter-spacing: 5px;
color: #ffffff;
text-shadow: 0 2px 5px rgba(0, 0, 0, 0.8);
line-height: 1;
}
.controls-row {
display: flex;
gap: 6px;
justify-content: center;
flex-wrap: wrap;
}
button {
padding: 10px 18px; font-size: 15px; font-weight: bold;
background: #4caf50; color: white; border: none; border-radius: 6px; cursor: pointer;
box-shadow: 0 3px 5px rgba(0,0,0,0.3); transition: transform 0.1s;
}
button:active { transform: translateY(2px); box-shadow: 0 1px 2px rgba(0,0,0,0.3); }
button:disabled { background: #555; color: #888; cursor: not-allowed; box-shadow: none; }
#buy-btn { background: #2196f3; display: none; }
#pass-btn { background: #f44336; display: none; }
#end-btn { background: #ff9800; display: none; }
#action-log {
background: #fff; border: 2px inset #ccc;
overflow-y: auto; padding: 10px;
font-size: 14px;
text-align: left; color: #000;
border-radius: 6px;
flex: 1;
min-height: 200px;
}
.log-entry { margin-bottom: 4px; border-bottom: 1px solid #eee; padding: 4px; border-radius: 4px; }
.tip-text {
font-size: 13px; color: #aaa; text-align: center; margin: 0;
}
#board-container {
flex: 1 1 auto;
display: flex;
justify-content: center;
align-items: center;
background: #1a1a1a;
padding: 0;
min-height: 0;
min-width: 0;
}
.board {
display: grid;
grid-template-columns: repeat(11, 1fr);
grid-template-rows: repeat(11, 1fr);
height: 100%;
max-height: 100%;
max-width: 100%;
aspect-ratio: 1 / 1;
border: 2px solid #000;
background: #cbf0e1;
box-shadow: 0 0 20px rgba(0,0,0,0.8);
}
.cell {
border: 1px solid #333;
position: relative;
color: #000;
background: #cbf0e1;
font-size: clamp(8px, 1.6vmin, 16px);
text-align: center;
line-height: 1.1;
cursor: pointer;
}
.center-area {
grid-column: 2 / 11;
grid-row: 2 / 11;
background: #cbf0e1;
display: flex; flex-direction: column;
align-items: center; justify-content: center;
padding: 15px; color: #000;
pointer-events: none;
}
.center-area h1 {
font-size: clamp(24px, 6vmin, 60px);
color: #d32f2f;
text-transform: uppercase;
letter-spacing: 5px;
transform: rotate(-45deg);
opacity: 0.15;
margin: 0;
}
.token-container {
position: absolute; top: 50%; left: 50%;
transform: translate(-50%, -50%);
display: flex; gap: 3px; z-index: 10;
pointer-events: none;
}
.house { width: clamp(6px, 1.5vmin, 12px); height: clamp(6px, 1.5vmin, 12px); background: #4caf50; border: 1px solid #000; }
.hotel { width: clamp(8px, 2vmin, 16px); height: clamp(8px, 2vmin, 16px); background: #f44336; border: 1px solid #000; }
@keyframes pulse {
0% { transform: scale(1); box-shadow: 0 0 4px #000; }
50% { transform: scale(1.3); box-shadow: 0 0 12px #fff; }
100% { transform: scale(1); box-shadow: 0 0 4px #000; }
}
.token {
width: clamp(14px, 3vmin, 24px); height: clamp(14px, 3vmin, 24px);
border-radius: 50%; border: 2px solid #fff;
box-shadow: 0 0 4px #000;
animation: pulse 1s infinite ease-in-out;
}
.emoji-display { font-size: clamp(16px, 3.5vmin, 28px); margin-bottom: 2px; pointer-events: none; }
.price { color: #333; pointer-events: none; font-size: clamp(8px, 1.6vmin, 12px); font-weight: bold; }
#pay-jail-btn { background: #9c27b0; display: none; }
#portrait-warning {
display: none;
position: fixed; top: 0; left: 0; width: 100dvw; height: 100dvh;
background: #111; color: white; z-index: 9999;
flex-direction: column; justify-content: center; align-items: center;
text-align: center; padding: 20px;
}
#portrait-warning h2 { color: #2196f3; font-size: 28px; margin: 10px 0; }
#portrait-warning p { font-size: 18px; color: #ccc; max-width: 400px; }
#portrait-warning svg { width: 80px; height: 80px; fill: white; animation: rotatePhone 2s infinite ease-in-out; }
@keyframes rotatePhone {
0% { transform: rotate(0deg); }
50% { transform: rotate(-90deg); }
100% { transform: rotate(-90deg); }
}
@media (orientation: portrait) {
#portrait-warning { display: flex; }
}
</style>
</head>

{ type: 'money', text: "Pay school tax of $50.", action: (p) => p.money -= 50 },

];
let turn = 0;
let state = 'SETUP';
let diceDoubleCount = 0;
let lastDiceTotal = 0;

function startGame(mode) {
document.getElementById('setup-screen').style.display = 'none';
document.getElementById('app').style.display = 'flex';
if (mode === 'ai') {
players = [
{ id: 'p1', name: 'You', money: 1500, pos: 0, color: '#2196f3', type: 'human', inJail: false },
{ id: 'p2', name: 'Computer', money: 1500, pos: 0, color: '#f44336', type: 'ai', inJail: false }
];

players = [

];

}
state = 'WAITING_ROLL';

log(`The game has started! It is ${players[0].name}'s turn.`);

function getGridPos(id) {
if (id === 0) return { r: 11, c: 11 };
if (id < 10) return { r: 11, c: 11 - id };
if (id === 10) return { r: 11, c: 1 };
if (id < 20) return { r: 11 - (id - 10), c: 1 };
if (id === 20) return { r: 1, c: 1 };
if (id < 30) return { r: 1, c: 1 + (id - 20) };
if (id === 30) return { r: 1, c: 11 };
if (id < 40) return { r: 1 + (id - 30), c: 11 };
}
function getColorBarStyles(id, color) {
if (!color) return '';
const colors = {
brown: '#8b4513', lightblue: '#87ceeb', pink: '#ff69b4', orange: '#ffa500',
red: '#f44336', yellow: '#ffeb3b', green: '#4caf50', darkblue: '#2196f3'
};
const bg = colors[color];
if (id > 0 && id < 10) return `background:${bg}; width:100%; height:25%; position:absolute; top:0; left:0; border-bottom:1px solid #333; display:flex; justify-content:center; align-items:center; gap:2px;`;
if (id > 10 && id < 20) return `background:${bg}; width:25%; height:100%; position:absolute; top:0; right:0; border-left:1px solid #333; display:flex; flex-direction:column; justify-content:center; align-items:center; gap:2px;`;
if (id > 20 && id < 30) return `background:${bg}; width:100%; height:25%; position:absolute; bottom:0; left:0; border-top:1px solid #333; display:flex; justify-content:center; align-items:center; gap:2px;`;
if (id > 30 && id < 40) return `background:${bg}; width:25%; height:100%; position:absolute; top:0; left:0; border-right:1px solid #333; display:flex; flex-direction:column; justify-content:center; align-items:center; gap:2px;`;
return '';
}
function getPadding(id) {
if (id > 0 && id < 10) return 'padding-top: 25%;';
if (id > 10 && id < 20) return 'padding-right: 25%;';
if (id > 20 && id < 30) return 'padding-bottom: 25%;';
if (id > 30 && id < 40) return 'padding-left: 25%;';
return '';
}
function createBoard() {
const board = document.getElementById('board');
board.innerHTML = '';
for(let i=0; i<40; i++) {
const space = spaces[i];
const pos = getGridPos(i);
const cell = document.createElement('div');
cell.className = 'cell';
cell.id = 'cell-' + i;
cell.style.gridRow = pos.r;
cell.style.gridColumn = pos.c;
cell.onclick = () => tryBuildHouse(i);
if (space.color) {
const colorBar = document.createElement('div');
colorBar.id = 'colorbar-' + i;
colorBar.style.cssText = getColorBarStyles(i, space.color);
cell.appendChild(colorBar);
}
const textWrap = document.createElement('div');
textWrap.style.cssText = getPadding(i) + ' z-index: 1; pointer-events: none; width:100%; height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center; box-sizing:border-box;';
if (i === 0) { textWrap.innerHTML = `<div class="emoji-display">🏁</div><div class="price">+$200</div>`; }
else if (i === 10) { textWrap.innerHTML = `<div class="emoji-display">🚓</div>`; }
else if (i === 20) { textWrap.innerHTML = `<div class="emoji-display">🅿️</div>`; }
else if (i === 30) { textWrap.innerHTML = `<div class="emoji-display">🚨</div>`; }
else { textWrap.innerHTML = `<div class="emoji-display">${space.emoji}</div>` + (space.price ? `<div class="price">${space.price}</div>` : ''); }
cell.appendChild(textWrap);
const tokenContainer = document.createElement('div');
tokenContainer.className = 'token-container';
tokenContainer.id = 'tokens-' + i;
cell.appendChild(tokenContainer);
board.appendChild(cell);
}
const center = document.createElement('div');
center.className = 'center-area';
center.innerHTML = `<h1>Monopoly</h1>`;
board.appendChild(center);
}
function tryBuildHouse(spaceId) {
const space = spaces[spaceId];
const player = players[turn];
if (player.type !== 'human') return;
if (state !== 'WAITING_ROLL' && state !== 'WAITING_END') return;
if (space.type !== 'property') return;
if (space.owner !== player.id) { log("❌ You can only build on your own properties."); return; }
const group = groups[space.color];
const ownsAll = group.every(id => spaces[id].owner === player.id);
if (!ownsAll) { log("❌ You must own all properties in this color group to build."); return; }
const minHouses = Math.min(...group.map(id => spaces[id].houses));
if (space.houses > minHouses) { log("❌ You must build evenly across the color group."); return; }
if (space.houses >= 5) { log("❌ Maximum number of buildings reached (Hotel)."); return; }
if (player.money < space.housePrice) { log("❌ Not enough money to build here ($" + space.housePrice + ")."); return; }
player.money -= space.housePrice;
space.houses++;
const typeName = space.houses === 5 ? "hotel" : "house";
log(`🏠 ${player.name} built a ${typeName} on ${space.emoji} for $${space.housePrice}.`);
updateBoardVisuals();
updateUI();
}

const logDiv = document.getElementById('action-log');
const entry = document.createElement('div');
entry.className = 'log-entry';
entry.innerText = msg;
if (msg.includes('You ') || msg.includes('Player 1') || msg.startsWith('You ')) {
entry.style.backgroundColor = '#e3f2fd';
entry.style.borderColor = '#bbdefb';
} else if (msg.includes('Computer') || msg.includes('Player 2') || msg.includes('🤖')) {
entry.style.backgroundColor = '#ffebee';
entry.style.borderColor = '#ffcdd2';
}
logDiv.appendChild(entry);
logDiv.scrollTop = logDiv.scrollHeight;
}
function showDice(d1, d2) {
const diceFaces = ['', '⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
document.getElementById('dice-display').innerText = `${diceFaces[d1]} ${diceFaces[d2]}`;
}
function getPlayer(id) { return players.find(p => p.id === id); }
function getPlayerName(id) { return getPlayer(id).name; }
function getRent(spaceId, diceTotal) {
const space = spaces[spaceId];
const ownerId = space.owner;
if (!ownerId) return 0;
if (space.type === 'property') {
const group = groups[space.color];
const ownsAll = group.every(id => spaces[id].owner === ownerId);
if (space.houses > 0) return space.rents[space.houses];
return ownsAll ? space.rents[0] * 2 : space.rents[0];
}
if (space.type === 'railroad') {
const count = groups.railroad.filter(id => spaces[id].owner === ownerId).length;
return 25 * Math.pow(2, count - 1);
}
if (space.type === 'utility') {
const count = groups.utility.filter(id => spaces[id].owner === ownerId).length;
return count === 2 ? 10 * diceTotal : 4 * diceTotal;
}
return 0;
}
function checkBankruptcy(player) {
if (player.money < 0) {
log(`!!! ${player.name} is BANKRUPT !!!`);
const winner = players.find(p => p.id !== player.id);
log(`🎉 ${winner.name} wins the game! 🎉`);
state = 'GAME_OVER';
updateUI();
hideActionButtons();
}
}
function updateTokens() {
for(let i=0; i<40; i++) {
document.getElementById('tokens-' + i).innerHTML = '';
document.getElementById('cell-' + i).style.backgroundColor = '';
}
players.forEach(p => {
const token = document.createElement('div');
token.className = 'token';
token.style.background = p.color;
document.getElementById('tokens-' + p.pos).appendChild(token);
document.getElementById('cell-' + p.pos).style.backgroundColor = '#ffff99';
});
}
function updateBoardVisuals() {
for(let i=0; i<40; i++) {
const space = spaces[i];
const cell = document.getElementById('cell-' + i);
if (space.owner) {
cell.style.boxShadow = `inset 0 0 0 4px ${getPlayer(space.owner).color}`;
}
if (space.type === 'property' && space.color) {
const cb = document.getElementById('colorbar-' + i);
if (cb) {
cb.innerHTML = '';
if (space.houses === 5) {
cb.innerHTML = '<div class="hotel"></div>';
} else if (space.houses > 0) {
for(let h=0; h<space.houses; h++) {
cb.innerHTML += '<div class="house"></div>';
}
}
}
}
}
}
function hideActionButtons() {
document.getElementById('buy-btn').style.display = 'none';
document.getElementById('pass-btn').style.display = 'none';
document.getElementById('end-btn').style.display = 'none';
document.getElementById('pay-jail-btn').style.display = 'none';
document.getElementById('roll-btn').style.display = 'inline-block';
}
function showEndTurnButton() {
hideActionButtons();
document.getElementById('roll-btn').style.display = 'none';
document.getElementById('end-btn').style.display = 'inline-block';
}
function updateUI() {
if (players.length < 2) return;
document.getElementById('p1-money').innerText = '$' + players[0].money;
document.getElementById('p2-money').innerText = '$' + players[1].money;
const rollBtn = document.getElementById('roll-btn');
const payJailBtn = document.getElementById('pay-jail-btn');
if (state === 'WAITING_ROLL' && players[turn].type === 'human') {
rollBtn.disabled = false;
if (players[turn].inJail && players[turn].money >= 50) {
payJailBtn.style.display = 'inline-block';
} else {
payJailBtn.style.display = 'none';
}
} else {
rollBtn.disabled = true;
payJailBtn.style.display = 'none';
}
}
function humanPayJail() {
if (state !== 'WAITING_ROLL') return;
const player = players[turn];
if (!player.inJail || player.money < 50) return;
player.money -= 50;
player.inJail = false;
diceDoubleCount = 0;
log(`💸 ${player.name} paid $50 to get out of jail.`);
document.getElementById('pay-jail-btn').style.display = 'none';
updateUI();
}
function advanceTo(player, target) {
let stepsToMove = target - player.pos;
if (stepsToMove <= 0) stepsToMove += 40;
movePlayer(player, stepsToMove);
}
function movePlayer(player, amount) {
let stepsTaken = 0;
let isForward = amount > 0;
let targetSteps = Math.abs(amount);
document.getElementById('roll-btn').disabled = true;
function takeStep() {
stepsTaken++;
if (isForward) {
player.pos++;
if (player.pos >= 40) {
player.pos = 0;
player.money += 200;
log(`${player.name} passed GO. Collected $200.`);
updateUI();
}
} else {
player.pos--;
if (player.pos < 0) player.pos = 39;
}
updateTokens();
if (stepsTaken < targetSteps) {
setTimeout(takeStep, 200);
} else {
resolveSpace(player, player.pos);
}
}
if (targetSteps > 0) setTimeout(takeStep, 200);
else resolveSpace(player, player.pos);
}
function sendToJail(player) {
player.pos = 10;
player.inJail = true;
diceDoubleCount = 0;
log(`🚓 ${player.name} was sent to jail!`);
updateTokens();
finishTurn();
}
function drawCard(player) {
const card = cards[Math.floor(Math.random() * cards.length)];
log(`${player.name} draws: "${card.text}"`);
card.action(player);
if (card.type === 'money' || card.type === 'keep') {
players.forEach(p => checkBankruptcy(p));
if (state !== 'GAME_OVER') finishTurn();
}
}
function buyProperty(player, space) {
if (player.money >= space.price) {
player.money -= space.price;
space.owner = player.id;
log(`${player.name} bought ${space.emoji} ${space.name} for $${space.price}.`);
updateBoardVisuals();
updateUI();
}
}
function resolveSpace(player, spaceId) {
const space = spaces[spaceId];
log(`${player.name} landed on ${space.emoji} ${space.name}.`);
if (space.type === 'property' || space.type === 'railroad' || space.type === 'utility') {
if (!space.owner) {
if (player.type === 'human') {
state = 'WAITING_ACTION';
document.getElementById('buy-btn').style.display = 'inline-block';
document.getElementById('buy-btn').innerText = `Buy ($${space.price})`;
document.getElementById('pass-btn').style.display = 'inline-block';
document.getElementById('roll-btn').style.display = 'none';
} else {
let bufferNeeded = 300;
if (space.type === 'property') {
const group = groups[space.color];
const ownedByMe = group.filter(id => spaces[id].owner === player.id).length;
const ownedByOthers = group.filter(id => spaces[id].owner && spaces[id].owner !== player.id).length;
if (ownedByMe > 0) bufferNeeded = 0;
else if (ownedByOthers > 0) bufferNeeded = 50;
else if (['orange', 'red', 'lightblue'].includes(space.color)) bufferNeeded = 150;
} else if (space.type === 'railroad') bufferNeeded = 100;
else if (space.type === 'utility') bufferNeeded = 400;
if (player.money >= space.price + bufferNeeded) buyProperty(player, space);
finishTurn();
}
} else if (space.owner !== player.id) {
const rent = getRent(spaceId, lastDiceTotal);
log(`💸 ${player.name} pays $${rent} in rent to ${getPlayerName(space.owner)}.`);
player.money -= rent;
getPlayer(space.owner).money += rent;
checkBankruptcy(player);
if (state !== 'GAME_OVER') finishTurn();
} else {
finishTurn();
}
} else if (space.type === 'tax') {
log(`💸 ${player.name} pays $${space.amount} in taxes.`);
player.money -= space.amount;
checkBankruptcy(player);
if (state !== 'GAME_OVER') finishTurn();
} else if (space.type === 'chance' || space.type === 'chest') {
drawCard(player);
} else if (space.type === 'gotojail') {
sendToJail(player);
} else {
finishTurn();
}
}
function finishTurn() {
updateUI();
if (state === 'GAME_OVER') return;
if (diceDoubleCount > 0 && diceDoubleCount < 3 && !players[turn].inJail) {
if (players[turn].type === 'human') {
state = 'WAITING_ROLL';
hideActionButtons();
log(`🎲 ${players[turn].name} rolled doubles! Roll again.`);
updateUI();
} else {
log(`🎲 ${players[turn].name} rolled doubles! Rolling again.`);
setTimeout(aiPlay, 1500);
}
} else {
if (players[turn].type === 'human') {
state = 'WAITING_END';
showEndTurnButton();
} else {
setTimeout(endTurnSequence, 1500);
}
}
}
function aiBuildLogic() {
const player = players[turn];
let built = true;
const colorRank = { orange: 8, red: 7, lightblue: 6, pink: 5, yellow: 4, darkblue: 3, green: 2, brown: 1 };
while(built) {
built = false;
let bestSpace = null;
let bestScore = -1;
for(let i=0; i<40; i++) {
const space = spaces[i];
if(space.owner === player.id && space.type === 'property') {
const group = groups[space.color];
const ownsAll = group.every(id => spaces[id].owner === player.id);
if(ownsAll) {
const minHouses = Math.min(...group.map(id => spaces[id].houses));
if(space.houses === minHouses && space.houses < 5) {
let requiredBuffer = space.houses >= 3 ? 600 : 300;
if(player.money >= space.housePrice + requiredBuffer) {
let score = colorRank[space.color] || 0;
if (space.houses < 3) score += 10;
if (score > bestScore) {
bestScore = score;
bestSpace = space;
}
}
}
}
}
}
if (bestSpace) {
player.money -= bestSpace.housePrice;
bestSpace.houses++;
const tName = bestSpace.houses === 5 ? "hotel" : "house";
log(`🤖 ${player.name} built a ${tName} on ${bestSpace.emoji}.`);
updateBoardVisuals();
updateUI();
built = true;
}
}
}
function endTurnSequence() {
if (state === 'GAME_OVER') return;
if (players[turn].type === 'ai') aiBuildLogic();
diceDoubleCount = 0;
turn = (turn + 1) % players.length;
state = 'WAITING_ROLL';
log(`--- ${players[turn].name}'s turn ---`);
hideActionButtons();
updateUI();
if (players[turn].type === 'ai') {
state = 'AI_TURN';
setTimeout(aiPlay, 1000);
}
}
function rollDice() {
if (state !== 'WAITING_ROLL' || players[turn].type !== 'human') return;
const player = players[turn];
const d1 = Math.floor(Math.random() * 6) + 1;
const d2 = Math.floor(Math.random() * 6) + 1;
lastDiceTotal = d1 + d2;
showDice(d1, d2);
log(`🎲 ${player.name} rolled ${d1} and ${d2} (${lastDiceTotal}).`);
if (player.inJail && player.jailCards > 0) {
log(`🎫 ${player.name} used a "Get out of Jail Free" card!`);
player.jailCards--;
player.inJail = false;
}
if (player.inJail) {
if (d1 === d2) {
log(`🎉 ${player.name} rolled doubles and got out of jail!`);
player.inJail = false;
diceDoubleCount = 0;
} else {
log(`🔒 ${player.name} did not roll doubles, and must stay in jail.`);
state = 'RESOLVING';
updateUI();
finishTurn();
return;
}
} else {
if (d1 === d2) {
diceDoubleCount++;
if (diceDoubleCount === 3) {
log(`Three doubles in a row! Go to jail.`);
sendToJail(player);
return;
}
} else {
diceDoubleCount = 0;
}
}
state = 'RESOLVING';
updateUI();
movePlayer(player, lastDiceTotal);
}
function humanBuy() {
if (state !== 'WAITING_ACTION') return;
const player = players[turn];
buyProperty(player, spaces[player.pos]);
hideActionButtons();
finishTurn();
}
function humanPass() {
if (state !== 'WAITING_ACTION') return;
log(`${players[turn].name} chose not to buy.`);
hideActionButtons();
finishTurn();
}
function humanEndTurn() {
if (state !== 'WAITING_END') return;
endTurnSequence();
}
function aiPlay() {
if (state === 'GAME_OVER') return;
const player = players[turn];
aiBuildLogic();
if (player.inJail && player.money > 300) {
player.money -= 50;
player.inJail = false;
diceDoubleCount = 0;
log(`💸 ${player.name} paid $50 to get out of jail.`);
updateUI();
}
const d1 = Math.floor(Math.random() * 6) + 1;
const d2 = Math.floor(Math.random() * 6) + 1;
lastDiceTotal = d1 + d2;
showDice(d1, d2);
log(`🎲 ${player.name} rolled ${d1} and ${d2} (${lastDiceTotal}).`);
if (player.inJail && player.jailCards > 0) {
log(`🎫 ${player.name} used a "Get out of Jail Free" card!`);
player.jailCards--;
player.inJail = false;
}
if (player.inJail) {
if (d1 === d2) {
log(`🎉 ${player.name} rolled doubles and gets out of jail!`);
player.inJail = false;
diceDoubleCount = 0;
} else {
log(`🔒 ${player.name} did not roll doubles, and must stay in jail.`);
finishTurn();
return;
}
} else {
if (d1 === d2) {
diceDoubleCount++;
if (diceDoubleCount === 3) {
log(`Three doubles in a row! ${player.name} goes to jail.`);
sendToJail(player);
return;
}
} else {
diceDoubleCount = 0;
}
}
movePlayer(player, lastDiceTotal);
}
</script>
