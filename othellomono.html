<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Othello Mono</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%2250%22 y=%2275%22 font-size=%2280%22 text-anchor=%22middle%22>%E2%9A%AA</text></svg>">
<style>
:root {
--bg-color: #000000;
--text-color: #00ff00;
--border-color: #004400;
--danger-color: #ff0000;
--accent-color: #00ff00;
}
* {
box-sizing: border-box;
margin: 0;
padding: 0;
}
body {
background-color: var(--bg-color);
color: var(--text-color);
font-family: 'Courier New', Courier, monospace;
font-weight: bold;
font-size: 18px;
display: flex;
justify-content: center;
align-items: center;
min-height: 100vh;
padding: 10px;
}
#game-wrapper {
display: flex;
gap: 20px;
align-items: flex-start;
width: clamp(350px, 95vw, 1000px);
max-height: 98vh;
}
#board-container {
flex-grow: 1;
display: flex;
flex-direction: column;
align-items: center;
}
#board {
display: grid;
grid-template-columns: repeat(8, 1fr);
grid-template-rows: repeat(8, 1fr);
width: 100%;
max-width: 80vh;
aspect-ratio: 1 / 1;
background-color: var(--bg-color);
border: 3px solid var(--text-color);
padding: 4px;
gap: 4px;
}
#sidebar {
display: flex;
flex-direction: column;
gap: 20px;
min-width: 240px;
flex-shrink: 0;
}
#status-bar {
display: flex;
flex-direction: column;
gap: 10px;
width: 100%;
border: 3px solid var(--border-color);
padding: 15px;
background: #000;
}
.score-box {
text-align: left;
font-size: 1.2rem;
padding: 5px;
border: 1px solid transparent;
}
.score-box.current-turn {
border: 1px solid var(--text-color);
background: #002200;
}
.score-box .player-label {
display: flex;
align-items: center;
gap: 10px;
margin-bottom: 4px;
text-transform: uppercase;
}
.score-box .piece-indicator {
width: 18px;
height: 18px;
border-radius: 50%;
}
#black-score .piece-indicator {
border: 2px solid var(--text-color);
background-color: transparent;
}
#white-score .piece-indicator {
background-color: var(--text-color);
}
.square {
background-color: #000;
border: 1px solid var(--border-color);
display: flex;
justify-content: center;
align-items: center;
position: relative;
}
.piece {
width: 80%;
height: 80%;
border-radius: 50%;
cursor: default;
transition: transform 0.2s ease-in-out;
transform: scale(0);
}
.piece.show {
transform: scale(1);
}
.piece.black {
background-color: transparent;
border: 3px solid var(--text-color);
}
.piece.white {
background-color: var(--text-color);
}
.valid-move-indicator {
width: 12px;
height: 12px;
background-color: var(--border-color);
border: 1px solid var(--text-color);
border-radius: 2px;
cursor: pointer;
opacity: 0.6;
}
.square:hover .valid-move-indicator {
opacity: 1;
background-color: var(--text-color);
}
#controls {
display: flex;
flex-direction: column;
gap: 15px;
}
#game-mode-selector {
display: flex;
flex-direction: column;
gap: 10px;
border: 3px solid var(--border-color);
padding: 15px;
}
#game-mode-selector label {
cursor: pointer;
display: flex;
align-items: center;
gap: 10px;
text-transform: uppercase;
}
input[type="radio"] {
accent-color: var(--text-color);
width: 18px;
height: 18px;
}
button {
background: #000000;
color: var(--text-color);
border: 3px solid var(--border-color);
padding: 15px;
font-size: 18px;
text-transform: uppercase;
cursor: pointer;
font-family: 'Courier New', Courier, monospace;
font-weight: bold;
width: 100%;
}
button:hover {
background: #002200;
border-color: var(--text-color);
}
.button-group {
display: flex;
gap: 10px;
}
.icon-button {
width: 60px;
padding: 0;
display: flex;
justify-content: center;
align-items: center;
}
#end-game-overlay {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0, 0, 0, 0.9);
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
gap: 30px;
z-index: 1000;
opacity: 0;
pointer-events: none;
transition: opacity 0.3s;
border: 10px double var(--text-color);
}
#end-game-message-text {
font-size: 2.5rem;
color: var(--text-color);
text-align: center;
padding: 20px;
text-transform: uppercase;
border: 3px solid var(--text-color);
}
#play-again-btn {
width: auto;
padding: 20px 40px;
}
#toast-message {
position: fixed;
bottom: 20px;
left: 50%;
transform: translateX(-50%);
background-color: var(--bg-color);
color: var(--text-color);
border: 3px solid var(--text-color);
padding: 10px 20px;
font-size: 1rem;
opacity: 0;
visibility: hidden;
transition: opacity 0.3s, visibility 0.3s;
z-index: 1001;
text-transform: uppercase;
}
#toast-message.show {
opacity: 1;
visibility: visible;
}
</style>
</head>
<body>
<div id="game-wrapper">
<div id="board-container">
<div id="board"></div>
</div>
<div id="sidebar">
<div id="status-bar">
<div id="black-score" class="score-box">
<div class="player-label">
<div class="piece-indicator"></div> Black
</div>
<span class="score-count">2</span>
</div>
<div id="white-score" class="score-box">
<div class="player-label">
<div class="piece-indicator"></div> White
</div>
<span class="score-count">2</span>
</div>
</div>
<div id="controls">
<div id="game-mode-selector">
<label><input type="radio" name="game-mode" value="pvp"> Player vs Player</label>
<label><input type="radio" name="game-mode" value="pva" checked> Player vs AI</label>
</div>
<div class="button-group">
<button id="new-game-btn">New Game</button>
<button id="mute-btn" class="icon-button">
<span class="mute-icon">SND</span>
</button>
</div>
</div>
</div>
</div>
<div id="end-game-overlay">
<div id="end-game-message-text"></div>
<button id="play-again-btn">Play Again</button>
</div>
<div id="toast-message"></div>
<script>
document.addEventListener('DOMContentLoaded', () => {
const BOARD_SIZE = 8;
const EMPTY = 0,
BLACK = 1,
WHITE = 2;
const players = {
[BLACK]: 'Black',
[WHITE]: 'White'
};
const directions = [{
r: -1,
c: 0
}, {
r: -1,
c: 1
}, {
r: 0,
c: 1
}, {
r: 1,
c: 1
},
{
r: 1,
c: 0
}, {
r: 1,
c: -1
}, {
r: 0,
c: -1
}, {
r: -1,
c: -1
}
];
const SQUARE_WEIGHTS = [
[120, -20, 20, 5, 5, 20, -20, 120],
[-20, -40, -5, -5, -5, -5, -40, -20],
[20, -5, 15, 3, 3, 15, -5, 20],
[5, -5, 3, 3, 3, 3, -5, 5],
[5, -5, 3, 3, 3, 3, -5, 5],
[20, -5, 15, 3, 3, 15, -5, 20],
[-20, -40, -5, -5, -5, -5, -40, -20],
[120, -20, 20, 5, 5, 20, -20, 120]
];
let board = [];
let currentPlayer;
let gameOver;
let isThinking = false;
let gameMode = 'pva';
const aiPlayer = WHITE;
const boardElement = document.getElementById('board');
const blackScoreElement = document.querySelector('#black-score .score-count');
const whiteScoreElement = document.querySelector('#white-score .score-count');
const blackScoreBox = document.getElementById('black-score');
const whiteScoreBox = document.getElementById('white-score');
const newGameBtn = document.getElementById('new-game-btn');
const audioContext = new(window.AudioContext || window.webkitAudioContext)();
let isMuted = false;
const muteButton = document.getElementById('mute-btn');
const muteIcon = muteButton.querySelector('.mute-icon');
const endGameOverlay = document.getElementById('end-game-overlay');
const endGameMessageText = document.getElementById('end-game-message-text');
const playAgainBtn = document.getElementById('play-again-btn');
const toastMessageElement = document.getElementById('toast-message');
const gameModeRadios = document.querySelectorAll('input[name="game-mode"]');
function playSound(type) {
if (isMuted || !audioContext) return;
const now = audioContext.currentTime;
let oscillator = audioContext.createOscillator();
let gainNode = audioContext.createGain();
oscillator.connect(gainNode);
gainNode.connect(audioContext.destination);
switch (type) {
case 'place':
oscillator.type = 'sine';
oscillator.frequency.setValueAtTime(200, now);
gainNode.gain.setValueAtTime(0.3, now);
gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
break;
case 'flip':
oscillator.type = 'sawtooth';
oscillator.frequency.setValueAtTime(400, now);
oscillator.frequency.exponentialRampToValueAtTime(800, now + 0.1);
gainNode.gain.setValueAtTime(0.2, now);
gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
break;
case 'invalid':
oscillator.type = 'square';
oscillator.frequency.setValueAtTime(150, now);
gainNode.gain.setValueAtTime(0.2, now);
gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
break;
case 'pass':
oscillator.type = 'triangle';
oscillator.frequency.setValueAtTime(500, now);
gainNode.gain.setValueAtTime(0.2, now);
oscillator.frequency.setValueAtTime(700, now + 0.1);
gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
break;
case 'win':
const frequencies = [392, 523, 659, 784];
frequencies.forEach((freq, i) => {
let osc = audioContext.createOscillator();
let gn = audioContext.createGain();
osc.connect(gn);
gn.connect(audioContext.destination);
osc.type = 'sine';
osc.frequency.setValueAtTime(freq, now + i * 0.15);
gn.gain.setValueAtTime(0.2, now + i * 0.15);
gn.gain.exponentialRampToValueAtTime(0.001, now + i * 0.15 + 0.1);
osc.start(now + i * 0.15);
osc.stop(now + i * 0.15 + 0.1);
});
return;
}
oscillator.start(now);
oscillator.stop(now + 0.3);
}
function showToast(message) {
toastMessageElement.textContent = message;
toastMessageElement.classList.add('show');
setTimeout(() => {
toastMessageElement.classList.remove('show');
}, 3000);
}
function createBoardDOM() {
boardElement.innerHTML = '';
for (let r = 0; r < BOARD_SIZE; r++) {
for (let c = 0; c < BOARD_SIZE; c++) {
const square = document.createElement('div');
square.className = 'square';
square.dataset.r = r;
square.dataset.c = c;
square.addEventListener('click', () => handleSquareClick(r, c));
boardElement.appendChild(square);
}
}
}
function initializePieces() {
for (let r = 0; r < BOARD_SIZE; r++) {
for (let c = 0; c < BOARD_SIZE; c++) {
const square = boardElement.children[r * BOARD_SIZE + c];
square.innerHTML = '';
const pieceValue = board[r][c];
if (pieceValue !== EMPTY) {
const piece = document.createElement('div');
piece.className = 'piece ' + (pieceValue === BLACK ? 'black' : 'white');
square.appendChild(piece);
setTimeout(() => piece.classList.add('show'), 50);
}
}
}
}
function initGame() {
gameMode = document.querySelector('input[name="game-mode"]:checked').value;
board = Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(EMPTY));
board[3][3] = WHITE;
board[3][4] = BLACK;
board[4][3] = BLACK;
board[4][4] = WHITE;
currentPlayer = BLACK;
gameOver = false;
isThinking = false;
hideEndGameOverlay();
initializePieces();
updateStatus();
highlightValidMoves(calculateValidMoves(currentPlayer));
if (gameMode === 'pva' && currentPlayer === aiPlayer) {
checkAiTurn();
}
}
function renderBoard() {
for (let r = 0; r < BOARD_SIZE; r++) {
for (let c = 0; c < BOARD_SIZE; c++) {
const square = boardElement.children[r * BOARD_SIZE + c];
square.innerHTML = '';
const pieceValue = board[r][c];
if (pieceValue !== EMPTY) {
const piece = document.createElement('div');
piece.className = 'piece ' + (pieceValue === BLACK ? 'black' : 'white');
square.appendChild(piece);
setTimeout(() => piece.classList.add('show'), 50);
}
}
}
const validMoves = calculateValidMoves(currentPlayer);
highlightValidMoves(validMoves);
}
function updateStatus() {
const scores = calculateScores();
blackScoreElement.textContent = scores[BLACK];
whiteScoreElement.textContent = scores[WHITE];
blackScoreBox.classList.toggle('current-turn', currentPlayer === BLACK && !gameOver);
whiteScoreBox.classList.toggle('current-turn', currentPlayer === WHITE && !gameOver);
}
function highlightValidMoves(moves) {
document.querySelectorAll('.valid-move-indicator').forEach(ind => ind.remove());
if (gameOver) return;
moves.forEach(({
r,
c
}) => {
const square = boardElement.children[r * BOARD_SIZE + c];
const indicator = document.createElement('div');
indicator.className = 'valid-move-indicator';
square.appendChild(indicator);
});
}
function handleSquareClick(r, c) {
if (gameOver || isThinking || board[r][c] !== EMPTY) {
if (board[r][c] !== EMPTY) playSound('invalid');
return;
}
if (gameMode === 'pva' && currentPlayer === aiPlayer) {
return;
}
const piecesToFlip = getFlips(r, c, currentPlayer);
if (piecesToFlip.length === 0) {
playSound('invalid');
showToast('Invalid move!');
return;
}
makeMove(r, c, piecesToFlip);
}
async function makeMove(r, c, piecesToFlip) {
isThinking = true;
board[r][c] = currentPlayer;
const targetSquare = boardElement.children[r * BOARD_SIZE + c];
targetSquare.innerHTML = '';
const newPiece = document.createElement('div');
newPiece.className = 'piece ' + (currentPlayer === BLACK ? 'black' : 'white');
targetSquare.appendChild(newPiece);
setTimeout(() => newPiece.classList.add('show'), 10);
playSound('place');
const indicator = targetSquare.querySelector('.valid-move-indicator');
if (indicator) {
indicator.remove();
}
for (let i = 0; i < piecesToFlip.length; i++) {
const {
r: fr,
c: fc
} = piecesToFlip[i];
await new Promise(resolve => setTimeout(resolve, 80));
board[fr][fc] = currentPlayer;
playSound('flip');
const flippedSquare = boardElement.children[fr * BOARD_SIZE + fc];
const flippedPiece = flippedSquare.querySelector('.piece');
if (flippedPiece) {
flippedPiece.classList.toggle('black', currentPlayer === BLACK);
flippedPiece.classList.toggle('white', currentPlayer === WHITE);
}
}
updateStatus();
await switchTurn();
isThinking = false;
}
function checkAiTurn() {
if (gameMode === 'pva' && currentPlayer === aiPlayer && !gameOver) {
isThinking = true;
setTimeout(aiMakeMove, 1000);
}
}
function aiMakeMove() {
const validMoves = calculateValidMoves(aiPlayer);
if (validMoves.length === 0) {
return;
}
let bestMoves = [];
let bestScore = -Infinity;
for (const move of validMoves) {
const tempBoard = board.map(row => [...row]);
const piecesToFlip = getFlips(move.r, move.c, aiPlayer);
tempBoard[move.r][move.c] = aiPlayer;
piecesToFlip.forEach(({
r,
c
}) => {
tempBoard[r][c] = aiPlayer;
});
const score = evaluateBoard(tempBoard, aiPlayer);
if (score > bestScore) {
bestScore = score;
bestMoves = [move];
} else if (score === bestScore) {
bestMoves.push(move);
}
}
const finalMove = bestMoves[Math.floor(Math.random() * bestMoves.length)];
if (finalMove) {
const piecesToFlip = getFlips(finalMove.r, finalMove.c, aiPlayer);
makeMove(finalMove.r, finalMove.c, piecesToFlip);
}
}
function evaluateBoard(board, player) {
let score = 0;
const opponent = player === BLACK ? WHITE : BLACK;
for (let r = 0; r < BOARD_SIZE; r++) {
for (let c = 0; c < BOARD_SIZE; c++) {
if (board[r][c] === player) {
score += SQUARE_WEIGHTS[r][c];
} else if (board[r][c] === opponent) {
score -= SQUARE_WEIGHTS[r][c];
}
}
}
return score;
}
async function switchTurn() {
const nextPlayer = (currentPlayer === BLACK) ? WHITE : BLACK;
const nextPlayerValidMoves = calculateValidMoves(nextPlayer);
if (nextPlayerValidMoves.length > 0) {
currentPlayer = nextPlayer;
updateStatus();
highlightValidMoves(nextPlayerValidMoves);
checkAiTurn();
return;
}
const currentPlayerValidMoves = calculateValidMoves(currentPlayer);
if (currentPlayerValidMoves.length === 0) {
endGame();
return;
}
playSound('pass');
showToast(`${players[nextPlayer]} has no valid moves. Turn passed.`);
updateStatus();
await new Promise(resolve => setTimeout(resolve, 2000));
highlightValidMoves(currentPlayerValidMoves);
checkAiTurn();
}
function calculateValidMoves(player) {
const moves = [];
for (let r = 0; r < BOARD_SIZE; r++) {
for (let c = 0; c < BOARD_SIZE; c++) {
if (board[r][c] === EMPTY) {
if (getFlips(r, c, player).length > 0) {
moves.push({
r,
c
});
}
}
}
}
return moves;
}
function getFlips(r, c, player) {
const opponent = player === BLACK ? WHITE : BLACK;
let allFlips = [];
for (const {
r: dr,
c: dc
} of directions) {
let currentFlips = [];
let row = r + dr;
let col = c + dc;
while (row >= 0 && row < BOARD_SIZE && col >= 0 && col < BOARD_SIZE) {
if (board[row][col] === opponent) {
currentFlips.push({
r: row,
c: col
});
} else if (board[row][col] === player) {
allFlips.push(...currentFlips);
break;
} else {
break;
}
row += dr;
col += dc;
}
}
return allFlips;
}
function calculateScores() {
let black = 0,
white = 0;
for (let r = 0; r < BOARD_SIZE; r++) {
for (let c = 0; c < BOARD_SIZE; c++) {
if (board[r][c] === BLACK) black++;
if (board[r][c] === WHITE) white++;
}
}
return {
[BLACK]: black,
[WHITE]: white
};
}
function displayEndGameMessage(message) {
endGameMessageText.textContent = message;
endGameOverlay.style.opacity = 1;
endGameOverlay.style.pointerEvents = 'auto';
playAgainBtn.style.display = 'block';
}
function hideEndGameOverlay() {
endGameOverlay.style.opacity = 0;
endGameOverlay.style.pointerEvents = 'none';
playAgainBtn.style.display = 'none';
}
function endGame() {
gameOver = true;
const scores = calculateScores();
let winnerMsg = "It's a draw!";
if (scores[BLACK] > scores[WHITE]) {
winnerMsg = "Black wins!";
} else if (scores[WHITE] > scores[BLACK]) {
winnerMsg = "White wins!";
}
displayEndGameMessage(`Game Over! ${winnerMsg}`);
playSound('win');
blackScoreBox.classList.remove('current-turn');
whiteScoreBox.classList.remove('current-turn');
}
newGameBtn.addEventListener('click', initGame);
playAgainBtn.addEventListener('click', initGame);
muteButton.addEventListener('click', () => {
isMuted = !isMuted;
muteIcon.textContent = isMuted ? 'OFF' : 'ON';
muteButton.title = isMuted ? 'Unmute Sound' : 'Mute Sound';
});
gameModeRadios.forEach(radio => {
radio.addEventListener('change', initGame);
});
createBoardDOM();
initGame();
});
</script>
<script>
(function() {
const css = `
#landscape-warning-overlay {
display: none;
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: #000;
color: #0f0;
z-index: 999999;
flex-direction: column;
justify-content: center;
align-items: center;
text-align: center;
font-family: Consolas, 'Courier New', monospace;
padding: 20px;
box-sizing: border-box;
}

/* Vis kun på skjermer som er høyere enn de er brede (Portrett) */
@media screen and (orientation: portrait) {
#landscape-warning-overlay {
display: flex !important;
}
}

#landscape-warning-overlay svg {
width: 80px;
height: 80px;
fill: #0f0;
margin-bottom: 20px;
animation: rotate-phone-anim 2s infinite ease-in-out;
}

#landscape-warning-overlay p {
font-size: 1.2em;
text-transform: uppercase;
letter-spacing: 2px;
margin: 0;
text-shadow: 0 0 5px #0f0;
}

@keyframes rotate-phone-anim {
0%, 10% { transform: rotate(0deg); }
40%, 60% { transform: rotate(-90deg); }
90%, 100% { transform: rotate(-90deg); }
}
`;
const style = document.createElement('style');
style.appendChild(document.createTextNode(css));
document.head.appendChild(style);
const overlay = document.createElement('div');
overlay.id = 'landscape-warning-overlay';
overlay.innerHTML = `
<svg viewBox="0 0 24 24">
<path d="M17,1.01L7,1C5.9,1 5,1.9 5,3v18c0,1.1 0.9,2 2,2h10c1.1,0 2,-0.9 2,-2V3C19,1.9 18.1,1.01 17,1.01z M17,21H7l0,-1h10V21z M17,18H7V6h10V18z M7,4V3h10v1H7z"/>
</svg>
<p>Please Rotate Device</p>
`;
document.body.appendChild(overlay);
})();
</script>
</body>
</html>
