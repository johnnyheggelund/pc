<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Euro Checkers">
<title>Euro Checkers</title>
<style>
:root {
--bg-color: #1e272e;
--board-dark: #57606f;
--board-light: #f1f2f6;
--piece-player: #f1f2f6;
--piece-ai: #ff4757;
--highlight-move: rgba(46, 213, 115, 0.6);
--highlight-select: #eccc68;
--error-color: #ff4757;
}
* {
box-sizing: border-box;
touch-action: manipulation;
-webkit-tap-highlight-color: transparent;
-webkit-touch-callout: none;
}
body {
font-family: 'Segoe UI', system-ui, sans-serif;
background-color: var(--bg-color);
color: white;
margin: 0;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
height: 100dvh;
overflow: hidden;
overscroll-behavior: none;
user-select: none;
-webkit-user-select: none;
}
.top-bar {
display: flex;
justify-content: space-between;
align-items: center;
width: 100%;
max-width: 600px;
padding: 10px 20px;
background: rgba(0,0,0,0.3);
border-radius: 8px;
margin-bottom: 15px;
}
.level-badge {
background: #2ed573;
color: #1e272e;
padding: 5px 12px;
border-radius: 20px;
font-weight: bold;
font-size: 1.1rem;
}
.status-text {
font-size: 1.2rem;
font-weight: bold;
text-transform: uppercase;
letter-spacing: 1px;
}
.board-container {
position: relative;
width: 100%;
max-width: min(95vw, calc(100dvh - 100px));
aspect-ratio: 1 / 1;
border: 4px solid #2f3542;
border-radius: 8px;
box-shadow: 0 10px 30px rgba(0,0,0,0.5);
overflow: hidden;
background-color: var(--board-dark);
}
#board {
display: grid;
grid-template-columns: repeat(8, 1fr);
grid-template-rows: repeat(8, 1fr);
width: 100%;
height: 100%;
}
.square {
display: flex;
justify-content: center;
align-items: center;
position: relative;
}
.light { background-color: var(--board-light); }
.dark { background-color: var(--board-dark); }
.piece {
width: 80%;
height: 80%;
border-radius: 50%;
box-shadow: 0 4px 6px rgba(0,0,0,0.4), inset 0 -4px 6px rgba(0,0,0,0.2);
position: relative;
z-index: 2;
transition: transform 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
display: flex;
justify-content: center;
align-items: center;
}
.piece.player { background-color: var(--piece-player); border: 2px solid #dfe4ea; }
.piece.ai { background-color: var(--piece-ai); border: 2px solid #ff6b81; }
.piece.king::after {
content: '♔';
font-size: clamp(20px, 4vw, 30px);
color: #eccc68;
text-shadow: 0 2px 4px rgba(0,0,0,0.5);
}
.piece.player.king::after { color: #f39c12; }
.selected {
outline: 4px solid var(--highlight-select);
outline-offset: 2px;
transform: scale(1.1);
z-index: 5;
}
.highlight {
background-color: var(--highlight-move) !important;
cursor: pointer;
}
.moving-piece {
position: fixed;
z-index: 1000;
pointer-events: none;
transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
@keyframes pulse-capture {
0% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7); }
70% { box-shadow: 0 0 0 10px rgba(255, 71, 87, 0); }
100% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); }
}
.must-capture {
animation: pulse-capture 1.5s infinite;
outline: 3px solid var(--error-color);
outline-offset: 2px;
}
@keyframes shake {
0%, 100% { transform: translateX(0); }
20%, 60% { transform: translateX(-5px); }
40%, 80% { transform: translateX(5px); }
}
.shake {
animation: shake 0.4s ease-in-out;
outline: 3px solid var(--error-color) !important;
outline-offset: 2px;
}
.modal-overlay {
position: fixed;
top: 0; left: 0; right: 0; bottom: 0;
background: rgba(30, 39, 46, 0.9);
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
z-index: 2000;
gap: 20px;
}
.modal-title { font-size: 2.5rem; color: #f1f2f6; margin: 0; text-align: center; }
button {
background: #3742fa;
color: white;
border: none;
padding: 15px 30px;
font-size: 1.2rem;
font-weight: bold;
border-radius: 8px;
cursor: pointer;
transition: background 0.2s, transform 0.1s;
}
button:hover { background: #5352ed; transform: scale(1.05); }
button:active { transform: scale(0.95); }
.hidden { display: none !important; }
</style>
</head>
<body>
<div class="top-bar">
<div class="level-badge" id="level-display">Level 1</div>
<div class="status-text" id="status-display">Ready</div>
<button onclick="GameController.showMenu()" style="padding: 8px 15px; font-size: 0.9rem;">Menu</button>
</div>
<div class="board-container">
<div id="board"></div>
</div>
<div id="main-menu" class="modal-overlay">
<h1 class="modal-title" id="menu-title">EURO CHECKERS</h1>
<p id="menu-subtitle" style="font-size: 1.2rem; color: #a4b0be;">Classic (8x8)</p>
<div style="display: flex; gap: 15px; flex-direction: column; width: 80%; max-width: 300px;">
<button id="btn-continue" onclick="GameController.start(false)" class="hidden">Continue Game</button>
<button id="btn-start-level" onclick="GameController.start(true)">Start Level 1</button>
<button onclick="GameController.resetLevel()" style="background: transparent; border: 2px solid #ff4757; padding: 10px; font-size: 1rem;">Reset Progression</button>
</div>
</div>
<script>
const AudioSys = (function() {
let ctx;
const init = () => { if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); if (ctx.state === 'suspended') ctx.resume(); };
const playOsc = (type, freq1, freq2, vol, dur) => {
if (!ctx) return;
const osc = ctx.createOscillator(), gain = ctx.createGain();
osc.type = type;
osc.frequency.setValueAtTime(freq1, ctx.currentTime);
if (freq2) osc.frequency.exponentialRampToValueAtTime(freq2, ctx.currentTime + dur);
gain.gain.setValueAtTime(vol, ctx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
osc.connect(gain); gain.connect(ctx.destination);
osc.start(); osc.stop(ctx.currentTime + dur);
};
return {
setup: init,
move: () => playOsc('sine', 400, 600, 0.3, 0.1),
capture: () => playOsc('sawtooth', 150, 50, 0.4, 0.2),
error: () => playOsc('square', 120, 80, 0.2, 0.2),
win: () => { setTimeout(()=>playOsc('triangle', 523, 0, 0.3, 0.3), 0); setTimeout(()=>playOsc('triangle', 659, 0, 0.3, 0.3), 150); setTimeout(()=>playOsc('triangle', 783, 0, 0.3, 0.4), 300); },
lose: () => { setTimeout(()=>playOsc('sawtooth', 300, 200, 0.3, 0.4), 0); setTimeout(()=>playOsc('sawtooth', 200, 100, 0.3, 0.6), 400); }
};
})();
const workerCode = `
const SIZE = 8;
const P_PLAYER = 1, P_AI = 2, EMPTY = 0;

function isValid(r, c) { return r >= 0 && r < SIZE && c >= 0 && c < SIZE; }

function getMoves(board, r, c, owner, isKing) {
const moves = [], enemy = owner === P_PLAYER ? P_AI : P_PLAYER;
const dirs = [[-1,-1], [-1,1], [1,-1], [1,1]];

// Slag (Inkluderer slag bakover for bønder i Euro)
if (isKing) {
for (let [dr, dc] of dirs) {
let nr = r + dr, nc = c + dc, foundEnemy = null;
while (isValid(nr, nc)) {
if (board[nr][nc]) {
if (board[nr][nc].owner === enemy && !foundEnemy) foundEnemy = {r: nr, c: nc};
else break; // Blokkert av egen brikke eller to fiender på rad
} else if (foundEnemy) {
moves.push({ fromR: r, fromC: c, toR: nr, toC: nc, isCapture: true, capR: foundEnemy.r, capC: foundEnemy.c });
// Optimalisering: Konge lander bare rett bak for å unngå ekstremt søketre (Vanlig AI-kompromiss)
break;
}
nr += dr; nc += dc;
}
}
} else {
for (let [dr, dc] of dirs) {
let mr = r + dr, mc = c + dc, er = r + dr*2, ec = c + dc*2;
if (isValid(er, ec) && board[mr][mc] && board[mr][mc].owner === enemy && board[er][ec] === EMPTY) {
moves.push({ fromR: r, fromC: c, toR: er, toC: ec, isCapture: true, capR: mr, capC: mc });
}
}
}

// Hvis vi kun vil ha slag (Brukes for å skille generering)
const captures = moves.filter(m => m.isCapture);
if (captures.length > 0) return captures;

// Vanlige trekk
if (isKing) {
for (let [dr, dc] of dirs) {
let nr = r + dr, nc = c + dc;
while (isValid(nr, nc) && board[nr][nc] === EMPTY) {
moves.push({ fromR: r, fromC: c, toR: nr, toC: nc, isCapture: false });
nr += dr; nc += dc;
}
}
} else {
// Bønder flytter kun fremover (Player: -1, AI: +1)
const forward = owner === P_PLAYER ? -1 : 1;
for (let dc of [-1, 1]) {
let nr = r + forward, nc = c + dc;
if (isValid(nr, nc) && board[nr][nc] === EMPTY) {
moves.push({ fromR: r, fromC: c, toR: nr, toC: nc, isCapture: false });
}
}
}
return moves;
}

function getAllMoves(board, player) {
let allMoves = [], hasCapture = false;
for (let r = 0; r < SIZE; r++) {
for (let c = 0; c < SIZE; c++) {
if (board[r][c] && board[r][c].owner === player) {
let moves = getMoves(board, r, c, player, board[r][c].isKing);
for (let m of moves) {
if (m.isCapture) hasCapture = true;
allMoves.push(m);
}
}
}
}
return hasCapture ? allMoves.filter(m => m.isCapture) : allMoves;
}

function evaluate(board) {
let score = 0;
for (let r = 0; r < SIZE; r++) {
for (let c = 0; c < SIZE; c++) {
let p = board[r][c];
if (p) {
let val = p.isKing ? 50 : 10;
// Posisjonsbonus for senter og fremrykking
if (!p.isKing) val += (p.owner === P_AI ? r : (SIZE - 1 - r)) * 0.5;
if (c > 1 && c < 6 && r > 1 && r < 6) val += 2;

score += (p.owner === P_AI ? val : -val);
}
}
}
return score + (Math.random() * 0.1); // Jitter for variasjon
}

function cloneBoard(board) {
return board.map(row => row.map(cell => cell ? { ...cell } : EMPTY));
}

function minimax(board, depth, alpha, beta, isMax, pendingJump) {
if (depth <= 0 && !pendingJump) return evaluate(board);

let moves = pendingJump
? getMoves(board, pendingJump.r, pendingJump.c, isMax ? P_AI : P_PLAYER, board[pendingJump.r][pendingJump.c].isKing).filter(m => m.isCapture)
: getAllMoves(board, isMax ? P_AI : P_PLAYER);

if (moves.length === 0) {
if (pendingJump) return minimax(board, depth - 1, alpha, beta, !isMax, null);
return isMax ? -10000 : 10000;
}

let bestVal = isMax ? -Infinity : Infinity;

for (let m of moves) {
let b = cloneBoard(board);
let p = b[m.fromR][m.fromC];
b[m.toR][m.toC] = p; b[m.fromR][m.fromC] = EMPTY;

let nextJump = null, promoted = false;
if (m.isCapture) {
b[m.capR][m.capC] = EMPTY;
// Sjekk multijump
let moreCaps = getMoves(b, m.toR, m.toC, p.owner, p.isKing).filter(x => x.isCapture);
if (moreCaps.length > 0) nextJump = { r: m.toR, c: m.toC };
}

// Euro-regel: Promotering skjer KUN hvis trekket avslutter på siste rad
if (!nextJump && !p.isKing) {
if ((p.owner === P_PLAYER && m.toR === 0) || (p.owner === P_AI && m.toR === SIZE - 1)) {
p.isKing = true;
}
}

let val = nextJump
? minimax(b, depth, alpha, beta, isMax, nextJump)
: minimax(b, depth - 1, alpha, beta, !isMax, null);

if (isMax) { bestVal = Math.max(bestVal, val); alpha = Math.max(alpha, bestVal); }
else { bestVal = Math.min(bestVal, val); beta = Math.min(beta, bestVal); }
if (beta <= alpha) break;
}
return bestVal;
}

self.onmessage = function(e) {
const { board, config, allPossibleMoves, pendingJump } = e.data;

let movesToEval = pendingJump
? getMoves(board, pendingJump.r, pendingJump.c, P_AI, board[pendingJump.r][pendingJump.c].isKing).filter(m=>m.isCapture)
: allPossibleMoves;

// Blunder logikk for lavere nivåer
if (config.blunder > 0 && Math.random() < config.blunder && movesToEval.length > 1) {
self.postMessage({ move: movesToEval[Math.floor(Math.random() * movesToEval.length)] });
return;
}

let bestMove = null, bestScore = -Infinity, alpha = -Infinity, beta = Infinity;

// Basic move ordering (Captures first)
movesToEval.sort((a, b) => (b.isCapture ? 1 : 0) - (a.isCapture ? 1 : 0));

for (let m of movesToEval) {
let b = cloneBoard(board);
let p = b[m.fromR][m.fromC];
b[m.toR][m.toC] = p; b[m.fromR][m.fromC] = EMPTY;

let nextJump = null;
if (m.isCapture) {
b[m.capR][m.capC] = EMPTY;
let moreCaps = getMoves(b, m.toR, m.toC, p.owner, p.isKing).filter(x => x.isCapture);
if (moreCaps.length > 0) nextJump = { r: m.toR, c: m.toC };
}
if (!nextJump && !p.isKing && m.toR === SIZE - 1) p.isKing = true;

let score = nextJump
? minimax(b, config.depth, alpha, beta, true, nextJump)
: minimax(b, config.depth - 1, alpha, beta, false, null);

if (score > bestScore) { bestScore = score; bestMove = m; }
alpha = Math.max(alpha, bestScore);
}
self.postMessage({ move: bestMove });
};
`;
const GameController = (function() {
const SIZE = 8, P_PLAYER = 1, P_AI = 2, EMPTY = 0;
let board = [], turn = P_PLAYER, level = 1;
let selected = null, validMoves = [], pendingJump = null;
let aiWorker = null, isAnimating = false, halfMoves = 0;
const getConfig = (lvl) => {
let depth = 2;
if (lvl > 5) depth = 3;
if (lvl > 15) depth = 4;
if (lvl > 30) depth = 5;
if (lvl > 40) depth = 6;
let blunder = Math.max(0, 0.5 - (lvl * 0.015));
return { depth, blunder };
};
const initWorker = () => {
if (aiWorker) aiWorker.terminate();
const blob = new Blob([workerCode], { type: 'application/javascript' });
aiWorker = new Worker(URL.createObjectURL(blob));
aiWorker.onmessage = (e) => {
if (e.data.move) animateMove(e.data.move);
else checkWinState();
};
};
const initBoard = () => {
board = Array(SIZE).fill(0).map(() => Array(SIZE).fill(EMPTY));
for (let r = 0; r < SIZE; r++) {
for (let c = 0; c < SIZE; c++) {
if ((r + c) % 2 !== 0) {
if (r < 3) board[r][c] = { owner: P_AI, isKing: false };
if (r > 4) board[r][c] = { owner: P_PLAYER, isKing: false };
}
}
}
};
const render = () => {
const container = document.getElementById('board');
container.innerHTML = '';
const allMyMoves = getValidMovesForPlayer(board, turn);
const mustCapture = allMyMoves.some(m => m.isCapture);
for (let r = 0; r < SIZE; r++) {
for (let c = 0; c < SIZE; c++) {
const sq = document.createElement('div');
sq.className = `square ${(r + c) % 2 === 0 ? 'light' : 'dark'}`;
let p = board[r][c];
if (p) {
const piece = document.createElement('div');
piece.className = `piece ${p.owner === P_PLAYER ? 'player' : 'ai'} ${p.isKing ? 'king' : ''}`;
piece.dataset.r = r; piece.dataset.c = c;
if (selected && selected.r === r && selected.c === c) piece.classList.add('selected');
if (turn === P_PLAYER && mustCapture && p.owner === P_PLAYER) {
let caps = getMovesForPiece(r, c).filter(m => m.isCapture);
if (caps.length > 0 && (!pendingJump || (pendingJump.r === r && pendingJump.c === c))) {
piece.classList.add('must-capture');
}
}
sq.appendChild(piece);
}
if (validMoves.some(m => m.toR === r && m.toC === c)) {
sq.classList.add('highlight');
}
sq.onclick = () => handleInput(r, c);
container.appendChild(sq);
}
}
document.getElementById('level-display').innerText = `Level ${level}`;
};
const getMovesForPiece = (r, c) => {
let p = board[r][c], moves = [], enemy = p.owner === P_PLAYER ? P_AI : P_PLAYER;
const dirs = [[-1,-1], [-1,1], [1,-1], [1,1]];
if (p.isKing) {
for (let [dr, dc] of dirs) {
let nr = r + dr, nc = c + dc, foundEnemy = null;
while (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE) {
if (board[nr][nc]) {
if (board[nr][nc].owner === enemy && !foundEnemy) foundEnemy = {r: nr, c: nc};
else break;
} else if (foundEnemy) {
moves.push({ fromR: r, fromC: c, toR: nr, toC: nc, isCapture: true, capR: foundEnemy.r, capC: foundEnemy.c });
break;
} else {
moves.push({ fromR: r, fromC: c, toR: nr, toC: nc, isCapture: false });
}
nr += dr; nc += dc;
}
}
} else {
for (let [dr, dc] of dirs) {
let mr = r+dr, mc = c+dc, er = r+dr*2, ec = c+dc*2;
if (er>=0 && er<SIZE && ec>=0 && ec<SIZE && board[mr][mc] && board[mr][mc].owner === enemy && board[er][ec] === EMPTY) {
moves.push({ fromR: r, fromC: c, toR: er, toC: ec, isCapture: true, capR: mr, capC: mc });
}
}
const forward = p.owner === P_PLAYER ? -1 : 1;
for (let dc of [-1, 1]) {
let nr = r + forward, nc = c + dc;
if (nr>=0 && nr<SIZE && nc>=0 && nc<SIZE && board[nr][nc] === EMPTY) {
moves.push({ fromR: r, fromC: c, toR: nr, toC: nc, isCapture: false });
}
}
}
return moves;
};
const getValidMovesForPlayer = (b, player) => {
let all = [], hasCap = false;
for(let r=0; r<SIZE; r++) for(let c=0; c<SIZE; c++) {
if(b[r][c] && b[r][c].owner === player) {
let moves = getMovesForPiece(r, c);
for(let m of moves) { if(m.isCapture) hasCap = true; all.push(m); }
}
}
return hasCap ? all.filter(m => m.isCapture) : all;
};
const handleInput = (r, c) => {
if (turn !== P_PLAYER || isAnimating) return;
AudioSys.setup();
const targetMove = validMoves.find(m => m.toR === r && m.toC === c);
if (targetMove) { animateMove(targetMove); return; }
let p = board[r][c];
if (p && p.owner === P_PLAYER && !pendingJump) {
const allMyMoves = getValidMovesForPlayer(board, P_PLAYER);
const pieceMoves = getMovesForPiece(r, c);
const mustCapture = allMyMoves.some(m => m.isCapture);
if (mustCapture) {
let caps = pieceMoves.filter(m => m.isCapture);
if (caps.length === 0) { triggerShake(r, c, "You MUST capture!"); return; }
selected = { r, c }; validMoves = caps; render();
} else {
if (pieceMoves.length === 0) { triggerShake(r, c, "No legal moves."); return; }
selected = { r, c }; validMoves = pieceMoves; render();
}
} else if (!targetMove) {
validMoves = []; selected = null; render();
}
};
const triggerShake = (r, c, msg) => {
const el = document.querySelector(`.piece[data-r="${r}"][data-c="${c}"]`);
if (el) {
el.classList.add('shake');
AudioSys.error();
setStatus(msg, true);
setTimeout(() => { el.classList.remove('shake'); setStatus("Your turn"); }, 1500);
}
};
const setStatus = (txt, isError = false) => {
const el = document.getElementById('status-display');
el.innerText = txt;
el.style.color = isError ? "var(--error-color)" : "white";
};
const animateMove = async (m) => {
isAnimating = true;
validMoves = [];
const bEl = document.getElementById('board');
const fromSq = bEl.children[m.fromR * SIZE + m.fromC];
const toSq = bEl.children[m.toR * SIZE + m.toC];
const piece = fromSq.querySelector('.piece');
if (piece) {
const rFrom = fromSq.getBoundingClientRect(), rTo = toSq.getBoundingClientRect();
const clone = piece.cloneNode(true);
clone.classList.add('moving-piece');
clone.style.left = rFrom.left + 'px'; clone.style.top = rFrom.top + 'px';
clone.style.width = rFrom.width + 'px'; clone.style.height = rFrom.height + 'px';
document.body.appendChild(clone);
piece.style.opacity = '0';
void clone.offsetWidth;
clone.style.transform = `translate(${rTo.left - rFrom.left}px, ${rTo.top - rFrom.top}px)`;
await new Promise(res => setTimeout(res, 300));
clone.remove();
}
let p = board[m.fromR][m.fromC];
board[m.toR][m.toC] = p; board[m.fromR][m.fromC] = EMPTY;
if (m.isCapture || !p.isKing) halfMoves = 0; else halfMoves++;
let nextJump = null;
if (m.isCapture) {
board[m.capR][m.capC] = EMPTY;
AudioSys.capture();
let moreCaps = getMovesForPiece(m.toR, m.toC).filter(x => x.isCapture);
if (moreCaps.length > 0) nextJump = { r: m.toR, c: m.toC };
} else {
AudioSys.move();
}
if (!nextJump && !p.isKing) {
if ((p.owner === P_PLAYER && m.toR === 0) || (p.owner === P_AI && m.toR === SIZE - 1)) p.isKing = true;
}
if (nextJump) {
pendingJump = nextJump;
selected = nextJump;
validMoves = getMovesForPiece(nextJump.r, nextJump.c).filter(x=>x.isCapture);
isAnimating = false;
render();
if (turn === P_AI) triggerAI();
} else {
pendingJump = null; selected = null; validMoves = [];
turn = turn === P_PLAYER ? P_AI : P_PLAYER;
isAnimating = false;
render();
checkWinState();
}
};
const checkWinState = () => {
if (halfMoves >= 40) { return endGame("DRAW (40 Moves)", false); }
let moves = getValidMovesForPlayer(board, turn);
if (moves.length === 0) {
if (turn === P_PLAYER) return endGame("AI WON!", false);
else return endGame("YOU WON!", true);
}
if (turn === P_AI) {
setStatus("AI Thinking...");
setTimeout(triggerAI, 100);
} else {
setStatus("Your turn");
}
};
const triggerAI = () => {
const moves = getValidMovesForPlayer(board, P_AI);
aiWorker.postMessage({
board: board, config: getConfig(level), allPossibleMoves: moves, pendingJump: pendingJump
});
};
const endGame = (msg, playerWon) => {
setStatus("Game Over");
document.getElementById('main-menu').classList.remove('hidden');
document.getElementById('menu-title').innerText = msg;
document.getElementById('menu-subtitle').innerText = playerWon ? "Fantastic play!" : "Better luck next time.";
if (playerWon) {
AudioSys.win();
level = Math.min(50, level + 1);
localStorage.setItem('damEuroLevel8x8', level);
GameController.updateMenuUI();
} else {
AudioSys.lose();
}
document.getElementById('btn-continue').classList.add('hidden');
};
return {
showMenu: () => {
document.getElementById('main-menu').classList.remove('hidden');
document.getElementById('menu-title').innerText = "EURO CHECKERS";
document.getElementById('menu-subtitle').innerText = "Classic (8x8)";
if (board.length > 0 && !isAnimating) document.getElementById('btn-continue').classList.remove('hidden');
},
start: (isNew) => {
AudioSys.setup();
document.getElementById('main-menu').classList.add('hidden');
if (isNew) {
level = parseInt(localStorage.getItem('damEuroLevel8x8')) || 1;
turn = P_PLAYER; halfMoves = 0; selected = null; pendingJump = null; validMoves = [];
initBoard();
initWorker();
setStatus("Your turn");
render();
}
},
resetLevel: () => {
if(confirm("Are you sure you want to delete your progress and start at Level 1?")) {
localStorage.setItem('damEuroLevel8x8', 1);
level = 1;
GameController.updateMenuUI();
}
},
updateMenuUI: () => {
const savedLvl = localStorage.getItem('damEuroLevel8x8') || 1;
document.getElementById('btn-start-level').innerText = `Start Level ${savedLvl}`;
document.getElementById('level-display').innerText = `Level ${savedLvl}`;
}
};
})();
window.onload = () => {
GameController.updateMenuUI();
};
</script>
</body>
</html>
