<script>
class AudioManager {
constructor() { this.audioCtx = null; this.mainGain = null; this.windAmbienceNodes = null; this.fireAmbienceNodes = null; this.isMuted = false; this.initialGainValue = 1.0; this.sharedBuffer = null; }
initAudioContext() { if (!this.audioCtx) { this.audioCtx = new(window.AudioContext || window.webkitAudioContext)(); this.mainGain = this.audioCtx.createGain(); this.mainGain.connect(this.audioCtx.destination); this.mainGain.gain.value = this.isMuted ? 0 : this.initialGainValue; const bufferSize = 2 * this.audioCtx.sampleRate; this.sharedBuffer = this.audioCtx.createBuffer(1, bufferSize, this.audioCtx.sampleRate); const output = this.sharedBuffer.getChannelData(0); for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1; } }
resume() { if (this.audioCtx && this.audioCtx.state === 'suspended') return this.audioCtx.resume(); return Promise.resolve(); }
toggleMute() { if (!this.audioCtx || !this.mainGain) return; this.isMuted = !this.isMuted; if (this.isMuted) { this.mainGain.gain.setValueAtTime(0, this.audioCtx.currentTime); } else { this.mainGain.gain.setValueAtTime(this.initialGainValue, this.audioCtx.currentTime); this.resume().catch(e => console.error(e)); } }
playTrainHorn() { this.initAudioContext(); this.resume(); if (!this.audioCtx || !this.mainGain) return; const ctx = this.audioCtx, t = ctx.currentTime; if (!this.trainReverbBuffer) { const len = ctx.sampleRate * 3.0, buf = ctx.createBuffer(2, len, ctx.sampleRate); for (let c = 0; c < 2; c++) { const data = buf.getChannelData(c); for (let i = 0; i < len; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 4); } this.trainReverbBuffer = buf; } const osc1 = ctx.createOscillator(), osc2 = ctx.createOscillator(), srcGain = ctx.createGain(); osc1.type = osc2.type = 'sawtooth'; osc1.frequency.setValueAtTime(300, t); osc2.frequency.setValueAtTime(370, t); osc1.connect(srcGain); osc2.connect(srcGain); const dryGain = ctx.createGain(); dryGain.gain.value = 0.03; srcGain.connect(dryGain); dryGain.connect(this.mainGain); const conv = ctx.createConvolver(); conv.buffer = this.trainReverbBuffer; const wetGain = ctx.createGain(); wetGain.gain.value = 0.06; srcGain.connect(conv); conv.connect(wetGain); wetGain.connect(this.mainGain); srcGain.gain.setValueAtTime(0, t); srcGain.gain.linearRampToValueAtTime(0.5, t + 0.1); srcGain.gain.setValueAtTime(0.5, t + 0.3); srcGain.gain.linearRampToValueAtTime(0, t + 0.6); osc1.start(t); osc2.start(t); osc1.stop(t + 4.0); osc2.stop(t + 4.0); }
playBuildingSound() { this.initAudioContext(); this.resume(); if (!this.audioCtx || !this.mainGain) return; const ctx = this.audioCtx, dest = this.mainGain, buf = this.sharedBuffer || ctx.createBuffer(1, ctx.sampleRate * 0.1, ctx.sampleRate), noise = ctx.createBufferSource(); noise.buffer = buf; const filter = ctx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.setValueAtTime(1000, ctx.currentTime); const gain = ctx.createGain(); gain.gain.setValueAtTime(0.3, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1); noise.connect(filter).connect(gain).connect(dest); noise.start(ctx.currentTime); noise.stop(ctx.currentTime + 0.1); }
playSirenEffect() { this.initAudioContext(); this.resume(); if (!this.audioCtx || !this.mainGain) return; const ctx = this.audioCtx, osc = ctx.createOscillator(), gain = ctx.createGain(), panner = ctx.createStereoPanner(); osc.connect(gain); gain.connect(panner); panner.connect(this.mainGain); osc.type = 'square'; gain.gain.setValueAtTime(0.04, ctx.currentTime); osc.frequency.value = 1000; osc.start(); let highTone = true, cycles = 0; const sirenInterval = setInterval(() => { if (cycles >= 4) { clearInterval(sirenInterval); osc.stop(); osc.disconnect(); gain.disconnect(); panner.disconnect(); return; } osc.frequency.setTargetAtTime(highTone ? 700 : 1000, ctx.currentTime, 0.05); panner.pan.setTargetAtTime(highTone ? -0.8 : 0.8, ctx.currentTime, 0.1); highTone = !highTone; cycles++; }, 350); }

function gameTick() { if (gameState.isGameOver) { clearInterval(gameState.gameInterval); return; } Object.assign(gameState, simulateYear(gameState, logEvent)); updateStatsPanel(gameState); updateFireLayer(); updateMinimap(); if (gameState.population >= config.WIN_CONDITION_POPULATION && !gameState.hasWon && !gameState.isGameOver) winGame(); if (gameState.budget < 0 && !gameState.isGameOver) loseGame(); }
function logEvent(m) { gameState.gameLog.unshift(`Year ${gameState.year}: ${m}`); if (gameState.gameLog.length > config.MAX_LOG_ENTRIES) gameState.gameLog.pop(); showTickerMessage(m); }
function saveGame() { if (gameState.isGameOver) return showTickerMessage("Cannot save a completed game."); try { localStorage.setItem('cityBuilderSave', JSON.stringify({ world, pollutionGrid: Array.from(pollutionGrid), budget: gameState.budget, population: gameState.population, year: gameState.year, isGameOver: gameState.isGameOver, hasWon: gameState.hasWon, gameLog: gameState.gameLog, taxRate: gameState.taxRate, difficulty: gameState.difficulty })); showTickerMessage("💾 Game saved!"); } catch (e) { alert(e.name === 'QuotaExceededError' ? 'Storage quota exceeded. Clear browser data.' : 'Could not save the game. Out of storage or in private mode.'); } }
function newGame(e) { if (e) e.preventDefault(); if (confirm("Are you sure? This will delete your current city and start a new game.")) { localStorage.removeItem('cityBuilderSave'); Object.assign(gameState, { budget: 100000, population: 0, year: 2025, isGameOver: false, hasWon: false, gameLog: [], isDisasterAnimating: false, taxRate: 0.7, currentTool: '' }); document.querySelectorAll('.tax-btn').forEach(b => b.classList.remove('active')); document.querySelector('.tax-btn[data-rate="0.7"]')?.classList.add('active'); if (saveBtn) saveBtn.disabled = false; if (newGameBtn) { newGameBtn.textContent = "✨ New Game"; newGameBtn.style.backgroundColor = ''; } document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active')); if (canvas) canvas.className = ''; initEmptyWorld(); distributePower(); updateTrainPaths(); updateStatsPanel(gameState); updateMinimap(); updateIncomeExpense(0, 0); if (gameState.gameInterval) clearInterval(gameState.gameInterval); gameState.gameInterval = setInterval(gameTick, 10000); showTickerMessage("A new city has been founded!"); hasScrolledToCenter = false; if (viewport.width > 0 && viewport.height > 0 && mapContainer) { mapContainer.scrollLeft = (config.gridSize * config.cellSize * currentZoom - viewport.width) / 2; mapContainer.scrollTop = (config.gridSize * config.cellSize * currentZoom - viewport.height) / 2; hasScrolledToCenter = true; updateMinimapViewport(); } } }
function winGame() { if (gameState.hasWon) return; gameState.hasWon = true; logEvent(`🏆 Congratulations! You reached ${config.WIN_CONDITION_POPULATION.toLocaleString()} residents in year ${gameState.year}!`); const fW = document.getElementById('fireworks-container'), tC = fW?.querySelector('.congrats-text'); if (fW && tC) { tC.innerHTML = `<h1>🏆 Congratulations! 🏆</h1><p>You've built an amazing city!</p><p style="font-size: 16px; margin-top: 20px; color: #aaa;">Reminder: If you want to keep this city, remember to <strong>Export</strong> your save file before starting a new game.</p><p style="font-size: 14px; margin-top: 10px; color: #888;">(Click to continue playing)</p>`; fW.classList.add('active'); fW.addEventListener('click', () => fW.classList.remove('active'), { once: true }); } }
function loseGame() { if (gameState.isGameOver) return; gameState.isGameOver = true; logEvent(`BANKRUPTCY: The city went bankrupt in year ${gameState.year}.`); clearInterval(gameState.gameInterval); handleGameOver(`GAME OVER\n\nYour city went bankrupt in year ${gameState.year}!`); }
function handleGameOver(m) { if (gameState.gameInterval) clearInterval(gameState.gameInterval); setTimeout(() => { if (saveBtn) saveBtn.disabled = true; if (newGameBtn) { newGameBtn.textContent = "✨ Restart"; newGameBtn.style.backgroundColor = '#4CAF50'; } }, 100); }
function onCanvasClick(e) { const i = getCellIndexFromEvent(e); if (i !== -1) handleCellClick(i); }
function handleCellClick(i) { if (i === -1 || !world[i]) return; const { currentTool: cT, isDisasterAnimating: iDA, isGameOver: iGO, budget: b, difficulty: d } = gameState; if (iDA || !cT || iGO || b < 0) return; const fC = Math.floor((config.costs[cT] || 0) * (config.difficultySettings[d || 'easy'].constructionCostMultiplier || 1.0)); if (b < fC) return showTickerMessage(`Not enough money! Need $${fC.toLocaleString()}`); let c = world[i], aT = false; if (c.base === 'lake' && !['power-line', 'bulldoze'].includes(cT)) return; if (config.largeBuildings.includes(cT)) { if (check2x2Area(i)) { gameState.budget -= fC; place2x2Building(i, cT); aT = true; } else showTickerMessage("Not enough space for this 2x2 building!"); } else if (cT === 'road') { if (c.base === 'train-track') { gameState.budget -= fC; c.base = 'rail-crossing'; c.roadWear = 0; c.hasTraffic = false; aT = true; } else if (c.base === 'grass' && !c.building) { gameState.budget -= fC; c.base = 'road'; c.roadWear = 0; c.hasTraffic = false; aT = true; } } else if (cT === 'train-track') { if (c.base === 'road') { gameState.budget -= fC; c.base = 'rail-crossing'; aT = true; } else if (c.base === 'grass' && !c.building) { gameState.budget -= fC; c.base = 'train-track'; aT = true; } } else if (cT === 'power-line') { if (!c.hasPowerLine && !c.building && ['grass', 'road', 'lake', 'train-track', 'rail-crossing'].includes(c.base)) { gameState.budget -= fC; c.hasPowerLine = true; aT = true; } } else if (cT === 'bulldoze') { if (c.building || c.hasPowerLine || ['road', 'train-track', 'rail-crossing'].includes(c.base)) { gameState.budget -= fC; if (c.building) { if (config.largeBuildings.includes(c.building.type)) { if (c.building.originIndex !== undefined) clear2x2Building(c.building.originIndex); else c.building = null; } else { if (c.building.type === 'industry') industrialZones = industrialZones.filter(x => x !== i); c.building = null; } if (c.onFire) c.onFire = false; } else if (c.hasPowerLine) c.hasPowerLine = false; else if (['road', 'train-track', 'rail-crossing'].includes(c.base)) { c.base = 'grass'; c.roadWear = 0; c.hasTraffic = false; } aT = true; } } else { if (!c.building && c.base === 'grass' && !c.hasPowerLine) { gameState.budget -= fC; let bD = { type: cT, population: 0, powered: false }; if (config.jobCapacity[cT]) bD.employees = 0; if (cT === 'park') bD.hasFountain = Math.random() < 0.1; if (cT === 'power-plant') { bD.powerLoad = 0; bD.isDamaged = false; } c.building = bD; aT = true; if (cT === 'industry') industrialZones.push(i); showTickerMessage(`Built ${config.buildingDisplayNames[cT]} (-$${fC})`); } } if (aT) { if (['train-track', 'bulldoze', 'road'].includes(cT)) updateTrainPaths(); audioManager.playBuildingSound(); if (['police-station', 'fire-station'].includes(cT)) audioManager.playSirenEffect(); distributePower(); updateStatsPanel(gameState); updateMinimap(); } }
function onCanvasMouseOver(e) { const i = getCellIndexFromEvent(e); if (i === -1) hideTooltip(); else showTooltip(i, e); }
function onCanvasMouseOut() { hideTooltip(); }
function handleMinimapNavigation(e) { const mc = document.getElementById('minimap-canvas'); if (!mc || !gridContainer || !mapContainer) return; const r = mc.getBoundingClientRect(), cx = e.clientX - r.left, cy = e.clientY - r.top; if (cx < 0 || cx > r.width || cy < 0 || cy > r.height) return; const tw = gridContainer.scrollWidth, th = gridContainer.scrollHeight; if (tw === 0 || th === 0 || mapContainer.clientWidth === 0 || mapContainer.clientHeight === 0) return; mapContainer.scrollLeft = ((cx / r.width) * tw) - (mapContainer.clientWidth / 2); mapContainer.scrollTop = ((cy / r.height) * th) - (mapContainer.clientHeight / 2); updateMinimapViewport(); }
function ensureAudioContextResumed() { if (audioManager?.audioCtx?.state === 'suspended') audioManager.audioCtx.resume().catch(e => console.error(e)); }
function setupEventListeners() { if (canvas) { canvas.addEventListener('click', e => { ensureAudioContextResumed(); onCanvasClick(e); }); canvas.addEventListener('mousemove', onCanvasMouseOver); canvas.addEventListener('mouseout', onCanvasMouseOut); } if (mapContainer) { mapContainer.addEventListener('scroll', updateMinimapViewport); let iP = null, iZ = 1, pC = {x:0, y:0}; mapContainer.addEventListener('touchstart', e => { if (e.touches.length === 2) { e.preventDefault(); iP = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); iZ = currentZoom; const r = mapContainer.getBoundingClientRect(); pC = { x: ((e.touches[0].clientX + e.touches[1].clientX) / 2) - r.left, y: ((e.touches[0].clientY + e.touches[1].clientY) / 2) - r.top }; } }, {passive: false}); mapContainer.addEventListener('touchmove', e => { if (e.touches.length === 2 && iP) { e.preventDefault(); setZoom(iZ * (Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY) / iP), pC.x, pC.y); } }, {passive: false}); mapContainer.addEventListener('touchend', e => { if (e.touches.length < 2) iP = null; }); mapContainer.addEventListener('wheel', e => { if (e.ctrlKey) { e.preventDefault(); const r = mapContainer.getBoundingClientRect(); setZoom(currentZoom * (e.deltaY > 0 ? 0.9 : 1.1), e.clientX - r.left, e.clientY - r.top); } }, {passive: false}); } document.getElementById('difficulty-select')?.addEventListener('change', e => { gameState.difficulty = e.target.value; showTickerMessage(`Difficulty changed to: ${e.target.options[e.target.selectedIndex].text}`); }); document.getElementById('ui-toggle-btn')?.addEventListener('click', () => { ensureAudioContextResumed(); if (gameLayout) { gameLayout.classList.toggle('ui-hidden'); setTimeout(updateMinimapViewport, 50); } }); document.getElementById('zoom-slider')?.addEventListener('input', e => setZoom(parseFloat(e.target.value))); document.getElementById('minimap-wrapper')?.addEventListener('mousedown', e => { ensureAudioContextResumed(); gameState.isDraggingMinimap = true; handleMinimapNavigation(e); e.preventDefault(); }); document.addEventListener('mousemove', e => { if (gameState.isDraggingMinimap) handleMinimapNavigation(e); }); document.addEventListener('mouseup', () => { if (gameState.isDraggingMinimap) gameState.isDraggingMinimap = false; }); document.querySelectorAll('.tool-btn').forEach(btn => btn.addEventListener('click', e => { ensureAudioContextResumed(); document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active')); e.currentTarget.classList.add('active'); gameState.currentTool = btn.dataset.tool; if (canvas) canvas.className = btn.dataset.tool === 'bulldoze' ? 'bulldoze-cursor' : 'build-cursor'; })); document.querySelectorAll('.tax-btn').forEach(btn => btn.addEventListener('click', e => { ensureAudioContextResumed(); gameState.taxRate = parseFloat(e.currentTarget.dataset.rate); document.querySelectorAll('.tax-btn').forEach(b => b.classList.remove('active')); e.currentTarget.classList.add('active'); showTickerMessage(`Taxes set to ${e.currentTarget.textContent.trim()}.`); })); document.getElementById('night-mode-btn')?.addEventListener('click', () => { ensureAudioContextResumed(); gameLayout?.classList.toggle('night-mode'); }); saveBtn?.addEventListener('click', () => { ensureAudioContextResumed(); saveGame(); }); newGameBtn?.addEventListener('click', e => { ensureAudioContextResumed(); newGame(e); }); document.getElementById('city-log-btn')?.addEventListener('click', () => { ensureAudioContextResumed(); showLog(gameState.gameLog); }); document.getElementById('how-to-play-btn')?.addEventListener('click', () => { ensureAudioContextResumed(); showHelp(); }); document.getElementById('economy-btn')?.addEventListener('click', () => { ensureAudioContextResumed(); showEconomyWindow(); }); document.getElementById('economy-modal-close')?.addEventListener('click', () => { const m = document.getElementById('economy-modal'); if (m) m.style.display = 'none'; audioManager.resume().catch(e => console.error(e)); }); document.querySelectorAll('.modal').forEach(m => { const c = m.querySelector('.modal-close'); if (c) c.onclick = () => { m.style.display = 'none'; audioManager.resume().catch(e => console.error(e)); }; m.addEventListener('click', e => { if (e.target === m) { m.style.display = 'none'; audioManager.resume().catch(e => console.error(e)); } }); }); document.getElementById('export-btn')?.addEventListener('click', () => { ensureAudioContextResumed(); exportGame(); }); document.getElementById('import-btn')?.addEventListener('click', () => { ensureAudioContextResumed(); importGame(); }); document.getElementById('import-input')?.addEventListener('change', handleFileSelect); const mB = document.getElementById('mute-sound-btn'); if (mB) { const uM = () => { audioManager.toggleMute(); mB.textContent = audioManager.isMuted ? '🔇' : '🔊'; mB.title = audioManager.isMuted ? 'Unmute Sound' : 'Mute Sound'; audioManager.isMuted ? mB.classList.add('muted') : mB.classList.remove('muted'); }; mB.addEventListener('click', uM); mB.textContent = audioManager.isMuted ? '🔇' : '🔊'; mB.title = audioManager.isMuted ? 'Unmute Sound' : 'Mute Sound'; audioManager.isMuted ? mB.classList.add('muted') : mB.classList.remove('muted'); } }
document.addEventListener('DOMContentLoaded', () => { init(); if (window.innerHeight > window.innerWidth && gameLayout) gameLayout.classList.add('ui-hidden'); });
</script>
<script>
(function() { const s = document.createElement('style'); s.innerHTML = `html, body, #map-container { overscroll-behavior-x: none !important; overscroll-behavior-y: none !important; touch-action: pan-x pan-y; }`; document.head.appendChild(s); const mc = document.getElementById('map-container'); if (mc) mc.addEventListener('wheel', e => { if (!e.ctrlKey && Math.abs(e.deltaX) > Math.abs(e.deltaY)) { if ((mc.scrollLeft <= 0 && e.deltaX < 0) || (mc.scrollLeft + mc.clientWidth >= mc.scrollWidth && e.deltaX > 0)) e.preventDefault(); } }, { passive: false }); })();
